    <style>
        /* Theme Variables */
        :root {
            --bg-color: #1a1a1a;
            --text-color: #fff;
            --text-shadow: rgba(0, 0, 0, 0.5);
            --code-bg: #333;
            --pre-bg: #2d2d2d;
            --overlay-bg: rgba(0, 0, 0, 0.95);
            --overlay-panel: rgba(255, 255, 255, 0.03);
            --border-color: #555;
            --input-bg: #2d2d2d;
            --subtle-bg: rgba(255, 255, 255, 0.05);
            --shadow-light: rgba(255, 255, 255, 0.2);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --progress-bg: rgba(0, 0, 0, 0.85);
        }
        
        :root[data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #1a1a1a;
            --text-shadow: rgba(255, 255, 255, 0.5);
            --code-bg: #e0e0e0;
            --pre-bg: #e8e8e8;
            --overlay-bg: rgba(245, 245, 245, 0.98);
            --overlay-panel: rgba(0, 0, 0, 0.03);
            --border-color: #ccc;
            --input-bg: #fff;
            --subtle-bg: rgba(0, 0, 0, 0.05);
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.2);
            --progress-bg: rgba(255, 255, 255, 0.90);
        }
        
        * { box-sizing: border-box; }
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        #slide-container {
            width: 100%;
            min-height: 100vh;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 3rem 2rem 200px 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        #slide-container h1 { font-size: 2.5em; margin: 0.5em 0; text-shadow: 2px 2px 4px var(--text-shadow); }
        #slide-container h2 { font-size: 2em; margin: 0.5em 0; text-shadow: 2px 2px 4px var(--text-shadow); }
        #slide-container h3 { font-size: 1.5em; margin: 0.5em 0; }
        #slide-container p { font-size: 1.2em; line-height: 1.6; max-width: 800px; margin: 0.5em auto; }
        #slide-container img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; }
        #slide-container ul, #slide-container ol { text-align: left; max-width: 600px; margin: 1em auto; font-size: 1.1em; }
        #slide-container code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 3px; }
        #slide-container pre { 
            background: var(--pre-bg); 
            padding: 1em; 
            border-radius: 8px; 
            overflow-x: visible; 
            text-align: left;
            font-family: 'Courier New', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 0.8em;
            line-height: 1.4;
            max-width: 100%;
            white-space: pre;
        }
        
        #slide-container pre code {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            padding: 0;
        }
        
        /* Start Overlay */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }
        
        #status-message {
            font-size: 1.1em;
            color: #aaa;
            margin: 0;
            min-height: 1.5em;
        }
        
        #status-message.success { color: #4CAF50; }
        #status-message.warning { color: #FF9800; }
        #status-message.error { color: #f44336; }
        
        /* Mode Selection */
        #mode-selection {
            margin: 1.5em 0;
            width: 100%;
            max-width: 500px;
        }
        
        #mode-selection fieldset {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1em;
            background: var(--overlay-panel);
        }
        
        #mode-selection legend {
            padding: 0 0.5em;
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .mode-option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .mode-option:hover {
            background: var(--subtle-bg);
        }
        
        .mode-option input[type="radio"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .mode-option-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .mode-option strong {
            font-size: 1.1em;
            color: var(--text-color);
        }
        
        .mode-option small {
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.3;
        }
        
        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            padding: 1em;
            background: var(--subtle-bg);
            border-radius: 8px;
        }
        
        #voice-controls-container.hidden {
            display: none;
        }
        
        #voice-select {
            min-width: 200px;
            padding: 0.5em;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
        }
        
        label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.9em;
            color: #ccc;
        }
        
        input[type="range"] {
            width: 120px;
        }
        
        #start-button {
            font-size: 1.3em;
            padding: 0.8em 2em;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        #start-button:hover:not(:disabled) {
            background: #45a049;
            transform: scale(1.05);
        }
        
        #start-button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Navigation Controls */
        #nav-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        #nav-controls.visible { display: flex; }
        
        #progress-indicator {
            background: var(--progress-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        
        .nav-button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .nav-button:hover { background: rgba(69, 160, 73, 1); transform: scale(1.05); }
        .nav-button:disabled { background: rgba(85, 85, 85, 0.5); cursor: not-allowed; }
        
        #pause-button {
            background: rgba(255, 152, 0, 0.9);
        }
        
        #pause-button:hover:not(:disabled) {
            background: rgba(245, 124, 0, 1);
        }
        
        #pause-button.paused {
            background: rgba(76, 175, 80, 0.9);
        }
        
        #pause-button.paused:hover {
            background: rgba(69, 160, 73, 1);
        }
        
        #pause-button.hidden {
            display: none;
        }
        
        /* Speed Control */
        .speed-control {
            background: var(--progress-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        
        .speed-control label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: default;
        }
        
        #speed-slider {
            width: 100px;
            height: 6px;
            cursor: pointer;
            background: var(--shadow-light);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
        }
        
        #speed-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        #speed-value {
            font-weight: bold;
            min-width: 45px;
            text-align: right;
            color: #4CAF50;
        }
        
        .speed-control.hidden {
            display: none;
        }
        
        /* Keyboard Hint */
        .keyboard-hint {
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 6px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        
        .keyboard-hint kbd {
            background: var(--shadow-dark);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--shadow-light);
            font-family: monospace;
            font-size: 0.9em;
        }
        
        /* Theme Toggle Button */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: var(--subtle-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
            z-index: 1001;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #theme-toggle:hover {
            background: var(--code-bg);
            transform: scale(1.05);
        }
        
        #theme-toggle .theme-icon {
            font-size: 1.3em;
        }
        
        /* Speed Toast Notification */
        #speed-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 12px;
            font-size: 1.8em;
            font-weight: bold;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 2px solid #4CAF50;
        }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #slide-container { padding: 2rem 1rem; }
            #slide-container h1 { font-size: 1.8em; }
            #slide-container h2 { font-size: 1.5em; }
            #slide-container p { font-size: 1em; }
            #controls { flex-direction: column; }
            #nav-controls { bottom: 10px; right: 10px; }
            
            #speed-slider {
                width: 150px;
            }
            
            .nav-button {
                padding: 10px 16px;
                font-size: 0.9em;
            }
            
            #speed-toast {
                font-size: 1.5em;
                padding: 1rem 2rem;
            }
            
            /* Mermaid Error Messages */
            .mermaid-error {
                background: rgba(244, 67, 54, 0.1);
                border-left: 4px solid #f44336;
                padding: 10px 15px;
                margin: 10px 0;
                border-radius: 4px;
                color: #f44336;
                font-size: 0.9em;
                text-align: left;
            }
            
            .mermaid-error::before {
                content: '⚠️ ';
                font-weight: bold;
            }
        }
    </style>
</head>

    <script id="slides-data" type="application/json">[{"html":"<h1>Welcome to JavaScript - Part 2!</h1>\n<p>Welcome back! 🎉</p>\n<p>In <strong>Part 1</strong>, you learned the foundations: variables, conditionals, loops, and functions. Now you&#39;re ready for the exciting stuff!</p>"},{"html":"<h2>Quick Recap: What You Already Know</h2>\n<p>Let&#39;s refresh your memory from Part 1:</p>\n<h3><strong>Variables &amp; Data Types</strong></h3>\n<pre><code class=\"language-javascript\">let name = &quot;Maria&quot;;      // String\nlet age = 15;            // Number\nlet isPassed = true;     // Boolean\n</code></pre>\n<h3><strong>Conditionals (Making Decisions)</strong></h3>\n<pre><code class=\"language-javascript\">if (score &gt;= 75) {\n    console.log(&quot;Passed!&quot;);\n} else {\n    console.log(&quot;Not yet!&quot;);\n}\n</code></pre>\n<h3><strong>Loops (Repeating Actions)</strong></h3>\n<pre><code class=\"language-javascript\">// For loop\nfor (let i = 1; i &lt;= 5; i++) {\n    console.log(i);\n}\n\n// While loop\nwhile (count &lt; 10) {\n    count++;\n}\n</code></pre>\n<h3><strong>Functions (Reusable Code)</strong></h3>\n<pre><code class=\"language-javascript\">function greet(name) {\n    return &quot;Hello, &quot; + name + &quot;!&quot;;\n}\n\nlet message = greet(&quot;Jose&quot;);  // &quot;Hello, Jose!&quot;\n</code></pre>\n<p><strong>Great!</strong> Now let&#39;s build on this foundation! 🚀</p>"},{"html":"<h2>Why Data Structures?</h2>\n<p>Imagine you need to store <strong>100 students&#39; names</strong>. Would you do this?</p>\n<pre><code class=\"language-javascript\">// ❌ Terrible way\nlet student1 = &quot;Maria&quot;;\nlet student2 = &quot;Jose&quot;;\nlet student3 = &quot;Ana&quot;;\n// ... 97 more lines ...\n</code></pre>\n<p><strong>No way!</strong> That&#39;s where <strong>Arrays</strong> and <strong>Objects</strong> come in! 🎯</p>\n<p><strong>Today you&#39;ll learn:</strong></p>\n<ul>\n<li>📦 <strong>Arrays</strong> - Store lists of data (names, scores, prices)</li>\n<li>🗂️ <strong>Objects</strong> - Store related information together (student profiles)</li>\n<li>⚡ <strong>Powerful Methods</strong> - Process data like a pro!</li>\n</ul>"},{"html":"<h2>Arrays - Your First Data Structure</h2>\n<p>An <strong>array</strong> is like a <strong>list</strong> that stores multiple values in one variable.</p>\n<h3><strong>Creating Arrays</strong></h3>\n<pre><code class=\"language-javascript\">// Empty array\nlet students = [];\n\n// Array with students\nlet students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;];\n\n// Array with numbers\nlet scores = [85, 90, 78, 92, 88];\n\n// Arrays can hold different types (but usually don&#39;t)\nlet mixed = [1, &quot;hello&quot;, true, 3.14];\n</code></pre>\n<p><strong>Think of it like:</strong> A numbered list where JavaScript counts starting from <strong>0</strong> (not 1!)</p>\n<pre><code>Array: [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;]\nIndex:    0       1       2       3\n</code></pre>\n<h3><strong>Why Start at 0?</strong></h3>\n<p>Computer scientists count from 0. It&#39;s weird at first, but you&#39;ll get used to it! 😊</p>\n<pre><code class=\"language-javascript\">let fruits = [&quot;apple&quot;, &quot;banana&quot;, &quot;orange&quot;];\n\n// Index:      0        1         2\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAe8AAAJHCAYAAAC5Lt7TAAAQAElEQVR4nOzdB3gUVRfG8QMEAoQaeu+9944gIigd6Sq9FwVUuqIoCihSpUgTKQKCIoigoqDSpPfee28JHcI35+bbNQkhBQLkhv/veebZ7MzsbM2+c8+9MxtdAACAVaILAACwCuENAIBlCG8AACxDeAMAYBnCGwAAyxDeAABYxkMAWGHu3EJF792LVl0ARHnRot38tEGDnbcftpzwBixx754UTZw4Y9/UqYvzfwtEYbt2zbt3/7584fxJeANRQaJEme/kydOA/1sgCtu9+0c/J7xDRJ83AACWIbwBwPHnn2vkn382CGADym8Anrpvv/1JRo6cbv5OmzalzJ8/Sp4lPz8/6dFjqPl7/frvBbhw4bL8/fd6qVChmCROnFAiUteun8mKFRvN3zVrVpQPPugo4UXLG4giRo+eIUWL1pfu3QeLDWLH9pRx4/rLxx93MddXrNhgHr9eulSv3sHM++23lYFu++OPS838+vW7SUSIHj26fPhhJxkwoEuYbxPc4w3LeocOHTfXf/55uTxNzZv3MdOjrLdmzRbzmCtUaCb IbwAALEN4AwBgGcIbAADLEN4AAFiG8AYAwDKENwAAliG8AQCwDOENAIBlCG8AACxDeAMAYBnCGwAAyxDeAABYhvAGAMAyhDcAAJYhvAEAsAzhDQCAZQhvAAAsQ3gDAGAZwhsAAMsQ3gAAWMZDAFjj8uWDMXfunCMAoq779/1CbVgT3oAlYsSQ9ZcuHR7oTAIgaosWTW6HuFwAAIBV6PMGAMAyhDcAAJYhvAEAsAzhDQCAZQhvAAAsQ3gDAGCZ/wEAAP//GC92AQAAAAZJREFUAwA1ApRG+IEcKAAAAABJRU5ErkJggg==\" alt=\"Diagram showing array with four elements labeled by index 0 through 3, demonstrating zero-based indexing\"></p>"},{"html":"<h2>Accessing Array Elements</h2>\n<p>Use <strong>square brackets</strong> with the index number:</p>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;];\n\nconsole.log(students[0]);  // Output: Maria\nconsole.log(students[1]);  // Output: Jose\nconsole.log(students[2]);  // Output: Ana\nconsole.log(students[3]);  // Output: Pedro\n\n// ❌ This doesn&#39;t exist!\nconsole.log(students[4]);  // Output: undefined\n</code></pre>\n<h3><strong>Get Array Length</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;];\n\nconsole.log(students.length);  // Output: 3\n\n// Get last item (useful trick!)\nlet lastStudent = students[students.length - 1];\nconsole.log(lastStudent);  // Output: Ana\n</code></pre>\n<h3><strong>Real Example: Quiz Scores</strong></h3>\n<pre><code class=\"language-javascript\">let quizScores = [85, 90, 78, 92, 88];\n\nconsole.log(&quot;First quiz: &quot; + quizScores[0]);    // First quiz: 85\nconsole.log(&quot;Last quiz: &quot; + quizScores[4]);     // Last quiz: 88\nconsole.log(&quot;Total quizzes: &quot; + quizScores.length);  // Total quizzes: 5\n</code></pre>\n<h3><strong>Changing Array Values</strong></h3>\n<pre><code class=\"language-javascript\">let scores = [85, 90, 78];\n\nconsole.log(scores);  // [85, 90, 78]\n\n// Change the second score\nscores[1] = 95;\n\nconsole.log(scores);  // [85, 95, 78]\n</code></pre>"},{"html":"<h2>Adding and Removing Items</h2>\n<p>Arrays are <strong>dynamic</strong> - they can grow and shrink!</p>\n<h3><strong>Adding to the End: push()</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;];\n\nstudents.push(&quot;Ana&quot;);\nconsole.log(students);  // [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;]\n\nstudents.push(&quot;Pedro&quot;);\nconsole.log(students);  // [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;]\n</code></pre>\n<h3><strong>Removing from the End: pop()</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;];\n\nlet removed = students.pop();  // Removes and returns &quot;Ana&quot;\nconsole.log(removed);          // &quot;Ana&quot;\nconsole.log(students);         // [&quot;Maria&quot;, &quot;Jose&quot;]\n</code></pre>\n<h3><strong>Adding to the Beginning: unshift()</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Jose&quot;, &quot;Ana&quot;];\n\nstudents.unshift(&quot;Maria&quot;);\nconsole.log(students);  // [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;]\n</code></pre>\n<h3><strong>Removing from the Beginning: shift()</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;];\n\nlet removed = students.shift();  // Removes and returns &quot;Maria&quot;\nconsole.log(removed);            // &quot;Maria&quot;\nconsole.log(students);           // [&quot;Jose&quot;, &quot;Ana&quot;]\n</code></pre>\n<h3><strong>Visual Summary</strong></h3>\n<pre><code>Array: [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;]\n\nunshift(&quot;Pedro&quot;)  →  [&quot;Pedro&quot;, &quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;]  (add to start)\npush(&quot;Rosa&quot;)      →  [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Rosa&quot;]   (add to end)\nshift()           →  [&quot;Jose&quot;, &quot;Ana&quot;]  (remove from start)\npop()             →  [&quot;Maria&quot;, &quot;Jose&quot;]  (remove from end)\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAyIAAAHeCAYAAABngr8VAAAQAElEQVR4nOzdB3gUVRfG8ZNC7733XpNsqAoIiigKAoI0UVFBBERAUbHRLIANRRQEVFSKIiAICqJIkSaSTULvvffe0r57Lmy+JAQSINm0/+95xpmdnZ2dTVYy75x773gKAAAAALiZpwAAAACAmxFEAAAAALgdQQQAAACA2xFEAAAAALgdQQQAAACA2xFEAAAAALidtyRDOeYPauIR4fGHAG4WKhEFzj0w6IgAAAAgUVERAQAAAOB2ybIi4lIjdxH52KepAImtxbKJcurKJQEAAIB7UBEBAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxABAAAA4HYEEQAAAABuRxBJYUa9PlTW/RsoqUFERIS82+UVObRnvwAAACBtIYgkA1vXbJRVC5bGud2/f/0jO9ZtlnI+lcSdTh8/KYtn/SFnTp6WhOTh4SGValSX74Z9IQAAAEhbCCLJwMxxk2TxzHk33ebsqTPy/fAvpXX3JyRDxox2nVYTdHIZ/dYH8kzdR+zU7Z428lbHF2T6mB/k8qVLcifOnjptw8L2tZvkTgUv+88en85Vs85t5fDeA/L39N8FAAAAaQdBJIX486dZkjFzRqn7YKPIdZmyZrZTVNlz55RXRr0rzw1+WcpWqyi/fz9NPuv3riQXWbJnizbPkDGD3Nv6IZk1frKEhoYKAAAA0gaCSArhXPyvVK7hI56e//+VZc6axU5RpUufTir5Vxf/hnWl8+svyGM9O8umgDXJpl+J63ijHnfVuv624rMlcL0AAAAgbfAW3FCXu1tK6+5PykZzIq/NkjJkyij1mzeWVs91itxm8ohxsuqvf+TT376PXPf5a+/JicPHZOCEEfbxwd37ZdLHY2TP1p0SFhomxcqWlPvbNhf/RndFe7/lc/+WmeOnyIUz56R2kwbSvvezJlikl3Onz8iBnXts5SCqmCEkNj5315Spo76Vfdt2SdXafra/x9RRE2TtygDx8vIS33q15PF+3cTb+/9fhe3rNtnj2LZmoxQuVVzqPXzfdfv9sNdb9rmSFcvInAlTpWjZUtLz/f5y/uw5+eWrifZnpj+DIqWLy5Ov9ZDi5UpfPeZsWaLNVfFypcTLvP/W4A1SuaaPAAAAIPUjiMThl7GT5OEn28izb/WW1QuXm0DxlRQpU1Jq3Vcv3vuYPGKsHD90RFo//4RkzJJZgpb8aysUUYPIgZ175d8//5HHejxlw8KPn30t+YsUkgc6tpR923fbbfIXLRRtv771a8X53h6eHlfnHlfnn7/2vuzfsVuadmptgkxmmfX1FPFK5y2dXu5mn794/oKMfOVdyZozu3QyAeXKpSsy/6dZse57s3OdqdSssJ8rd4F8dt2Ytz6QHRu2SvOn20mufLllwc9zZGi3/vLej19K7vx5bQBp/ky7aEFEqzz5ihSwYQsAAABpA0EkDnebakCLLh3s8n1tHpa/p/8mS+f8dUtBZPembbbycE+LB+zj2o3rX7eNp5en9BzaX9JnyGAfL541X3aZ16lzp87YeZbsWaO9Rqsdcb73lh12XsxUHTY518qO9ZvliVeel0aPXq2u5MiTS8YP+dRUeR6XLNmy2s+mzaT6jx4mhUoWtdvo/IOeb163733bd8mb4z+UMlUq2MdaSVm/Kki6vfNK5GfUz937oSdk/pSZpsLTxX6+Vl0fv25f+t5nr31OAAAApH70EYlDrnx5oj0uWrqE7Ll2ch9fvvV log(&quot;Items: &quot; + cart.length);\n\n// Remove last item\nlet removed = cart.pop();\nconsole.log(&quot;Removed: &quot; + removed);\nconsole.log(&quot;Cart now: &quot; + cart);\n\n// Output:\n// Cart: Coke Sakto,Pan de sal,Skyflakes\n// Items: 3\n// Removed: Skyflakes\n// Cart now: Coke Sakto,Pan de sal\n</code></pre>"},{"html":"<h2>Practice: Student Roster</h2>\n<p><strong>Challenge:</strong> Create a class roster system that can add and remove students.</p>\n<p><strong>Try it yourself! Solution:</strong></p>\n<pre><code class=\"language-javascript\">let classRoster = [];\n\n// Add students\nclassRoster.push(&quot;Maria Santos&quot;);\nclassRoster.push(&quot;Jose Cruz&quot;);\nclassRoster.push(&quot;Ana Reyes&quot;);\nclassRoster.push(&quot;Pedro Garcia&quot;);\n\nconsole.log(&quot;Class Roster:&quot;);\nconsole.log(&quot;Total students: &quot; + classRoster.length);\n\n// Show each student\nfor (let i = 0; i &lt; classRoster.length; i++) {\n    console.log((i + 1) + &quot;. &quot; + classRoster[i]);\n}\n\n// Output:\n// Class Roster:\n// Total students: 4\n// 1. Maria Santos\n// 2. Jose Cruz\n// 3. Ana Reyes\n// 4. Pedro Garcia\n</code></pre>"},{"html":"<h2>Essential Array Methods</h2>\n<p>Now for the <strong>powerful stuff</strong>! These methods make working with arrays much easier.</p>\n<blockquote>\n<p>🟢 <strong>You Need These!</strong> Master these three methods - they&#39;re used everywhere in real JavaScript code.</p>\n</blockquote>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAUUAAARqCAYAAADftmcZAAAQAElEQVR4nOzdBXhTSRsF4IMWiru7u7s7LO4ui7u7u7u7OyzOoou7u7u7u/7zTUn+STUVaAvnfZ6ScpOmN7fJyTeSOwFBRERWAUFERFYMRSIiA0ORiMjAUCQiMjAUiYgMgd27MvSm3t0DIoC7tyEi8k++4Pu2N0V673LrencDL8D3AN0RAA4gIvpNBJRcBLwWit4V5O4LRPr3rKvXvU0cGS/zJAIRkV9idyjWjJsWgQJ4rgvyxbvreBjzJZI0LWu7/ex1PNpzConjpQcR0c92/Pk9nHzxwK7b2h+KcdLCIaDnCsvzTwNjb8hb+Dtuehfb94e862I7EdHP8O37N7tDkaPPP8HR7ftwYs9hEJH/w1D0Yd++fcOEroMxtkM/T/3cv/P+wfq5y+FXXD51Hof+24OfZfvKDbh3/Tbo5/OJY31k215cOnkOfwI/G4qT /pre>\n<h3><strong>Real Example: Sari-Sari Store Prices</strong></h3>\n<pre><code class=\"language-javascript\">let products = [&quot;Coke Sakto&quot;, &quot;Pan de sal&quot;, &quot;Skyflakes&quot;];\nlet prices = [20, 5, 15];\n\nconsole.log(&quot;Aling Maria&#39;s Store - Price List:&quot;);\nconsole.log(&quot;================================&quot;);\n\nproducts.forEach(function(product, index) {\n    console.log(product + &quot; - ₱&quot; + prices[index]);\n});\n\n// Output:\n// Aling Maria&#39;s Store - Price List:\n// ================================\n// Coke Sakto - ₱20\n// Pan de sal - ₱5\n// Skyflakes - ₱15\n</code></pre>\n<h3><strong>map() - Transform Each Item</strong></h3>\n<p><code>map()</code> creates a <strong>new array</strong> by transforming each item:</p>\n<pre><code class=\"language-javascript\">let prices = [100, 200, 150];\n\n// Add 10% tax to each price\nlet withTax = prices.map(function(price) {\n    return price * 1.10;\n});\n\nconsole.log(&quot;Original: &quot; + prices);    // [100, 200, 150]\nconsole.log(&quot;With tax: &quot; + withTax);   // [110, 220, 165]\n</code></pre>\n<p><strong>Key point:</strong> <code>map()</code> doesn&#39;t change the original array - it makes a new one!</p>\n<h3><strong>Real Example: Grade Bonus</strong></h3>\n<pre><code class=\"language-javascript\">let scores = [75, 80, 85, 90];\n\n// Teacher adds 5 bonus points to everyone\nlet bonusScores = scores.map(function(score) {\n    return score + 5;\n});\n\nconsole.log(&quot;Original scores: &quot; + scores);\nconsole.log(&quot;With bonus: &quot; + bonusScores);\n\n// Output:\n// Original scores: 75,80,85,90\n// With bonus: 80,85,90,95\n</code></pre>\n<h3><strong>Real Example: Peso Prices to Dollar</strong></h3>\n<pre><code class=\"language-javascript\">let pesoPrices = [100, 250, 500, 1000];\nlet exchangeRate = 56.50;\n\nlet dollarPrices = pesoPrices.map(function(pesos) {\n    return (pesos / exchangeRate).toFixed(2);\n});\n\nconsole.log(&quot;Peso: &quot; + pesoPrices);\nconsole.log(&quot;Dollar: $&quot; + dollarPrices);\n\n// Output:\n// Peso: 100,250,500,1000\n// Dollar: $1.77,$4.42,$8.85,$17.70\n</code></pre>\n<h3><strong>filter() - Keep Only Some Items</strong></h3>\n<p><code>filter()</code> creates a <strong>new array</strong> with only items that pass a test:</p>\n<pre><code class=\"language-javascript\">let scores = [85, 65, 90, 72, 78, 95];\n\n// Keep only passing scores (≥75)\nlet passed = scores.filter(function(score) {\n    return score &gt;= 75;\n});\n\nconsole.log(&quot;All scores: &quot; + scores);\nconsole.log(&quot;Passed: &quot; + passed);\n\n// Output:\n// All scores: 85,65,90,72,78,95\n// Passed: 85,90,78,95\n</code></pre>\n<p><strong>How it works:</strong> If the function returns <code>true</code>, keep the item. If <code>false</code>, skip it.</p>\n<h3><strong>Real Example: Filter Available Products</strong></h3>\n<pre><code class=\"language-javascript\">let products = [&quot;Coke&quot;, &quot;Pepsi&quot;, &quot;Sprite&quot;, &quot;Water&quot;];\nlet stock = [10, 0, 5, 0];  // 0 = out of stock\n\nlet available = products.filter(function(product, index) {\n    return stock[index] &gt; 0;\n});\n\nconsole.log(&quot;All products: &quot; + products);\nconsole.log(&quot;Available: &quot; + available);\n\n// Output:\n// All products: Coke,Pepsi,Sprite,Water\n// Available: Coke,Sprite\n</code></pre>\n<h3><strong>Real Example: Find Top Students</strong></h3>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;, &quot;Rosa&quot;];\nlet scores = [95, 72, 88, 91, 85];\n\n// Find students with 85 or higher\nlet topStudents = students.filter(function(student, index) {\n    return scores[index] &gt;= 85;\n});\n\nconsole.log(&quot;Top students (85+): &quot; + topStudents);\n\n// Output:\n// Top students (85+): Maria,Ana,Pedro,Rosa\n</code></pre>\n<h3><strong>Combining Methods</strong></h3>\n<p>You can <strong>chain</strong> methods together! 🔗</p>\n<pre><code class=\"language-javascript\">let scores = [70, 85, 65, 90, 78, 92];\n\n// Filter passing scores, then add 5 bonus points\nlet result = scores\n    .filter(function(score) {\n        return score &gt;= 75;  // Keep passing scores\n    })\n    .map(function(score) {\n        return score + 5;    // Add bonus\n    });\n\nconsole.log(&quot;Original: &quot; + scores);\nconsole.log(&quot;Passed with bonus: &quot; + result);\n\n// Output:\n// Original: 70,85,65,90,78,92\n// Passed with bonus: 90,95,83,97\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABeUAAABeCAYAAACtk3/iAAAQAElEQVR4nOzdBVwUXRcG8MemQRSREMFEQQkFuwO7OzFfxRa7u7sTu7u74xUVxMbuDkJAxfruucsuuzR+yit4/v7WXXZnZme27sy5Z85NDcYYY4wxxhhjjDHGGGOMJYnUYIwxxhhjjDHGGGOMMcZYkuCgPGOMMcYYY4wxxhhjjDGWRDgozxhjjDHGGGOMMcYYY4wlEQ7KM8YYY4wxxhhjjDHGGGNJhIPyjDHGGGOMMcYYY4wxxlgSSQvGGGOMMcYYY4wxxhhjfxTDgyMqp/qRqjhYMvXjcaDbCK+YHokzKN+uY9APMJaC3bttkO748VRfkUyFeumIdU+VBoyxRBGN20y9tqE9kUyVGBVG6z4djMXph8+ZYbqFkUytqx9eOFXqbxfAGIvLrSabtG2RTBUb8dk2depvN8FYPMS+272zw3RyIZkKKls21/e0ae+AMZbkxO9HqPHhw3pIrr6nqoxU8ARLplKdEf/FGJTn8jWMMcYYY4wxxhhjjDHGWBJJUPmaoSMNwFhKMnZkML5/R4qh3WC/6HzjalSMxefrnS344jcfKUWlAmnRvAR/95mmB2++Y+SWcKQU+uapULhjBjDGIoW9/QHvOZ+RUpgZpcL4Jvw9Z9G9Dv6BfmtTzmc9tbEx9Pv0AWMsCYSHI2jECKQkhY0tYG9oCvZne/UpBPte3I53Oj6SZ4wxxhhjjDHGGGOMsT+YS0YLNLEqCPZnuxL0KkFBeS5fwxhjjDHGGGOMMcYYY4wlEQ7KM8YYY4wxxhhjjDHGGGNJhIPyjDHGGGOMMcYYY4wxxlgS4aA8Y4wxxhhjjDHGGGOMMZZEOCjPGGOMMcYYY4wxxhhjjCURDsozxhhjjDHGGGOMMcYYY0mEg/KMMcYYY4wxxhhjjDHGWBLhoDxjjDHGGGOMMcYYY4wxlkQ4KM8YY4wxxhhjjDHGGGOMJREOyjPGGGOMMcYYY4wxxhhjSYSD8owxxhhjjDHGGGOMMcZYEuGgPGOMMcYYY4wxxhhjjDGWRDgozxhjjDHGGGOMMcYYY4wlEQ7KM8YYY4wxxhhjjDHGGGNJhIPyjDHGGGOMMcYYY4wxxlgS4aA8Y+yvFBb2CS07TsT7gGCwn/Pk6Ru07zoNX79+A2OJ5X3mKHy8T4ExljTGzOoL36vn8Df78eMHeo10x7OXj8EYYyz5WnXoEJbs3Qv25zrs44Oxq1eDMRY7DsozxpLMq9cBGDTSCxVq9UONRkMxdvJaBAaGaEyzYu0hLF97EL/b7IU7kCWzEYwzGoD9nGyWJvgh/i1duQ+MJcb3798xfUx/TB7RW3Xf00f3MXvSULx59QJ/mkN7tuDp4wdgLLk6ce4g/O9eRf48jvibpUqVCg75XTDLawwY+5vdu30 nd&quot;;\n    }\n}\n\nconsole.log(findStudentByID(103));  // Output: Ana\nconsole.log(findStudentByID(999));  // Output: Student not found\n</code></pre>\n<h3><strong>reduce() - Combine All Items into One Value</strong></h3>\n<p><code>reduce()</code> is <strong>powerful</strong> but takes practice to understand. It &quot;reduces&quot; an array to a single value.</p>\n<p><strong>Common use: Calculate total</strong></p>\n<pre><code class=\"language-javascript\">let prices = [50, 100, 75, 125];\n\nlet total = prices.reduce(function(sum, price) {\n    return sum + price;\n}, 0);  // Start with 0\n\nconsole.log(&quot;Total: ₱&quot; + total);  // Output: Total: ₱350\n</code></pre>\n<p><strong>How it works:</strong></p>\n<pre><code>Step 1: sum=0,   price=50  → return 0+50=50\nStep 2: sum=50,  price=100 → return 50+100=150\nStep 3: sum=150, price=75  → return 150+75=225\nStep 4: sum=225, price=125 → return 225+125=350\nFinal: 350\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOIAAAN2CAYAAADkD1UfAAAQAElEQVR4nOydBXgUyRaFLwkQ3BISJEBwWdzd3WGRxd3d3d3d3d1h4eHuENx9cbcQJIFXt6CHSYhMlKrh/N83TOjuzHRm+tS9davrlA0BAH47NgQA+O1AiAAoAIQIgAJAiAAoAIQIgAJAiAAoQFhLD2zU5PUdChMmEQEALCRMkzkzo8225EhERAAUwOKIaNCmQ1SKESMMAQB8ZvNGd3I99SVAv4OICIACQIgAKACECIACQIgAKACECIACQIgAKACECIACQIgAKACECIACQIgAKACECIACQIgAKACECIACQIgAKACECIACQIgAKMAfI8Sjh3fTyeMHCAAVCfAMfR35+vUrjRraVf68ZvNJ0oGhA9rTqRMH5c+Fi5WnVu36EvCfmn/npU+fPsqfW3foT4WKlCUd+COEaGNjI78UmzB6JQCp0mSgGrVbUMyYDvL/e3Ztpsnj+v9yXPvOgylfwZLyZ2501qycS3vFsWHDhqMixStQ+Uq1KaD879/VtHDuBMqYORd16TnStN2S13/75jUtWTiZThzdR84JElOFv+tSlmx5LXrfA3u30fjRvX/ZHjt2HJo+bzNNmTCQdu/Y+Mv+2Qu3UcxYDtRrwET6LIQ4uF9b0ok/QoiMLi2jOdGixaC06bP+sr1nv/FkZxfB9P/ESVKafuYL9bSIpLXrt6GPH91pyYLJ9Orlc6rXqD1ZwovnT2ny+P507sxxCm9n98t+/17/y5cv1LtbI4oUKQo1btGNrl+9IKN7t95jKHvOAv6+f9oM2WjA0Olets2dOVq+nkG8+AmpWaueXo5hETJ/pc0shPiJdOOPEaI1kUZcbBEjRvpl+5s3r0RE2SovUo5UzJcvn2nNijlUs24rChcunL+vPXFsX3pw/w4NGDaDFsweF+DXZ5E+uH+Xps3dRI6OcSl33qLy9f63ZZVFQowZ014+DF6+eEb37t6kFm1+RskIESL HbRxfP38ZLOtsgOAHEVFR2Jr/yLa91HXqELKPEztA+z2+fCFPD0+yixjBtI1dxfm4kLLVB0EDQlQQtiZcP2uJtDPkNSwunzont7NfaZK/Uvq7f9O8FXT24Am5xBovw3ZbiJAXM63fozUBNYEQFeTyybPymZdO44cBr7DUY/pwf/dz4YZduecMHE+24cLK1Y2bDuhEOYsXIKAm8DUFVg98TQEAFgEhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACgAhAqAAECIACqC8edSOxzfp0punBEBgefJR/cV5lBfi9ifXCQBrB6kpAAqgZET89o0WhQlDhwmAYCZs2LB3SUGU9DUF4E8DqSkACgAhAqAAECIACgAhAqAAECIACvB/AAAA///p03TtAAAABklEQVQDABy9vpNya6/CAAAAAElFTkSuQmCC\" alt=\"Step-by-step flowchart showing reduce accumulator evolution through each iteration with state values\"></p>\n<h3><strong>Real Example: Calculate Total Baon Spent</strong></h3>\n<pre><code class=\"language-javascript\">let dailyExpenses = [65, 80, 70, 55, 90];  // Mon-Fri\n\nlet totalSpent = dailyExpenses.reduce(function(sum, expense) {\n    return sum + expense;\n}, 0);\n\nconsole.log(&quot;Weekly expenses:&quot;);\ndailyExpenses.forEach(function(expense, index) {\n    let days = [&quot;Mon&quot;, &quot;Tue&quot;, &quot;Wed&quot;, &quot;Thu&quot;, &quot;Fri&quot;];\n    console.log(days[index] + &quot;: ₱&quot; + expense);\n});\nconsole.log(&quot;Total: ₱&quot; + totalSpent);\n\n// Output:\n// Weekly expenses:\n// Mon: ₱65\n// Tue: ₱80\n// Wed: ₱70\n// Thu: ₱55\n// Fri: ₱90\n// Total: ₱360\n</code></pre>\n<h3><strong>includes() - Check if Item Exists</strong></h3>\n<p>Simple way to check if an array contains something:</p>\n<pre><code class=\"language-javascript\">let fruits = [&quot;apple&quot;, &quot;banana&quot;, &quot;orange&quot;];\n\nconsole.log(fruits.includes(&quot;banana&quot;));  // true\nconsole.log(fruits.includes(&quot;mango&quot;));   // false\n</code></pre>\n<h3><strong>Real Example: Check Membership</strong></h3>\n<pre><code class=\"language-javascript\">let members = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;];\n\nfunction checkMembership(name) {\n    if (members.includes(name)) {\n        console.log(name + &quot; is a member! ✅&quot;);\n    } else {\n        console.log(name + &quot; is not a member. ❌&quot;);\n    }\n}\n\ncheckMembership(&quot;Jose&quot;);   // Jose is a member! ✅\ncheckMembership(&quot;Pedro&quot;);  // Pedro is not a member. ❌\n</code></pre>\n<h3><strong>slice() - Copy Part of Array</strong></h3>\n<p>Get a portion of an array <strong>without changing the original</strong>:</p>\n<pre><code class=\"language-javascript\">let students = [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;, &quot;Pedro&quot;, &quot;Rosa&quot;];\n\nlet firstThree = students.slice(0, 3);  // Start at 0, stop before 3\nconsole.log(firstThree);  // [&quot;Maria&quot;, &quot;Jose&quot;, &quot;Ana&quot;]\n\nlet lastTwo = students.slice(-2);  // Last 2 items\nconsole.log(lastTwo);  // [&quot;Pedro&quot;, &quot;Rosa&quot;]\n\nconsole.log(students);  // Original unchanged!\n</code></pre>\n<h3><strong>sort() - Sort Array Items</strong></h3>\n<p>Sort items in alphabetical or numerical order:</p>\n<pre><code class=\"language-javascript\">// Sort strings (alphabetical)\nlet names = [&quot;Pedro&quot;, &quot;Ana&quot;, &quot;Maria&quot;, &quot;Jose&quot;];\nnames.sort();\nconsole.log(names);  // [&quot;Ana&quot;, &quot;Jose&quot;, &quot;Maria&quot;, &quot;Pedro&quot;]\n\n// Sort numbers (needs special function!)\nlet scores = [85, 90, 78, 92, 88];\n\n// ❌ Wrong way\nscores.sort();\nconsole.log(scores);  // [78, 85, 88, 90, 92] - works by luck!\n\n// ✅ Right way for numbers\nscores.sort(function(a, b) {\n    return a - b;  // Ascending order\n});\nconsole.log(scores);  // [78, 85, 88, 90, 92]\n\n// Descending order\nscores.sort(function(a, b) {\n    return b - a;  // Reverse\n});\nconsole.log(scores);  // [92, 90, 88, 85, 78]\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAqcAAAKNCAYAAAAd0sJUAAAQAElEQVR4nOzdB3xNdxsH8OdmJ/beewdJJLSoPWq2quVFaa2qPUupUbTU3lqjRosqRVUpqlrULpn2ptSqLbKT+z7PP7m3SWTnJjn33t/387nuXnHPOb/z/MexIQAAAAAAjbAhAAAAAACNQDgFAAAAAM1AOAUAAAAAzUA4BQAAAADNQDgFAAAAAM1AOAUAAACL9WKly3I+ et scores = [1500, 2000, 1800, 1200];\n\n// Create leaderboard (sorted by score, highest first)\nlet leaderboard = [];\n\nfor (let i = 0; i &lt; players.length; i++) {\n    leaderboard.push({\n        name: players[i],\n        score: scores[i]\n    });\n}\n\n// Sort by score (highest first)\nleaderboard.sort(function(a, b) {\n    return b.score - a.score;\n});\n\nconsole.log(&quot;🏆 LEADERBOARD 🏆&quot;);\nleaderboard.forEach(function(player, index) {\n    console.log((index + 1) + &quot;. &quot; + player.name + &quot; - &quot; + player.score + &quot; pts&quot;);\n});\n\n// Output:\n// 🏆 LEADERBOARD 🏆\n// 1. Jose - 2000 pts\n// 2. Ana - 1800 pts\n// 3. Maria - 1500 pts\n// 4. Pedro - 1200 pts\n</code></pre>"},{"html":"<h2>Practice: Array Methods Challenge</h2>\n<p><strong>Challenge:</strong> Given an array of quiz scores, find the average of all passing scores (≥75).</p>\n<p><strong>Try it yourself! Solution:</strong></p>\n<pre><code class=\"language-javascript\">let scores = [85, 65, 90, 72, 78, 95, 68, 88];\n\n// Step 1: Filter passing scores\nlet passingScores = scores.filter(function(score) {\n    return score &gt;= 75;\n});\n\n// Step 2: Calculate sum using reduce\nlet sum = passingScores.reduce(function(total, score) {\n    return total + score;\n}, 0);\n\n// Step 3: Calculate average\nlet average = sum / passingScores.length;\n\nconsole.log(&quot;All scores: &quot; + scores);\nconsole.log(&quot;Passing scores: &quot; + passingScores);\nconsole.log(&quot;Average of passing: &quot; + average.toFixed(1));\n\n// Output:\n// All scores: 85,65,90,72,78,95,68,88\n// Passing scores: 85,90,78,95,88\n// Average of passing: 87.2\n</code></pre>"},{"html":"<h2>Objects - Organizing Related Data</h2>\n<p><strong>Arrays</strong> store lists. <strong>Objects</strong> store related information together.</p>\n<h3><strong>Creating Objects</strong></h3>\n<pre><code class=\"language-javascript\">// Empty object\nlet student = {};\n\n// Object with properties\nlet student = {\n    name: &quot;Maria Santos&quot;,\n    age: 15,\n    grade: 9,\n    isPassed: true\n};\n</code></pre>\n<p><strong>Think of it like:</strong> A real-world object with <strong>labels</strong> (properties) describing it.</p>\n<pre><code>Student Object:\n{\n    name: &quot;Maria Santos&quot;    ← property: value\n    age: 15                 ← property: value\n    grade: 9\n    isPassed: true\n}\n</code></pre>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAlsAAAJICAYAAABWhyFEAAAQAElEQVR4nOzdBWBTVxcH8PNSwZ3i7qNocbfh7gwbbsOdAcNlw224bjgbMHxjOAwZMgZsMDYY2zfci7ZNvntOSUjaWJsGCPn/WBd5/vKSd3LueTc6AgAAAAC30REAAAAAuA2CLQAAAAA3QrAFAAAA4EYItgAAAADcCMEWAAAAgBsh2AIAAABwI19HI6xbV/AvihbNQGTQ1J1QZ5ZjyaBX0+uszMuZadW4WsRxo7AO1pdlMGh6TTM4Ck7D1J+PjWFqm+wFtwa1jpqjdbS6HWqL1bo5Gzhrah0NPtFYtuUSLfax1X3u5Jyc2q9RWJco432nV3OJ4jFqMYsX6qWNRS4wGAzPNU2LTS4xhLx63/hQtMl7j++4+kWMj1XNtXUxzYe58PowOU7UX4x8wQxVx63OteM2nMGgD9E0nR/FDLWveBM1F/eVcV68z6P62WCV6XMxap9Vjuf3ap5hap6uHmeRxNC6WuPgXBCRtc9sa+T978yxFMXlOzNvZ9fRJivnzqic9x15fRyrz1n1/jXExHvEgo+Pvl/Dhr9stDXc7gLXrQvao9P5ZI4dKz5FldoY3ij54/tRnDja50913lQfN7oIz+nUc3rnZiCfVdbmq7aD7G+H7tVZ29aakZ3pnZl/tPalE8txZtlu42KsZO31jtr04ct2Zft1Kr7RG5w8vtw4D+3V/116LV2OXcPxe8FA5PLxGlPzCT9O+LM8Zo7zmHrPxOR7jz8feFYxsl6vPmtiYv3M5yGr6OLqRfwcdNfnl/s+F22cZFxcD/tnmOiN6ew6uLqv7J87XWe+xTFxHo3oxcsnFBYWuoHsfLl0GN0lS5yWypdoRQAAAABg6fS5nXT56km746BmCwAAAMCNEGwBAAAAuFGMF4kBAAAAeAspc9U0u4VgCLYAAAAAoskQfhWP3aseHARb+lBNQ0sjAAAAQHQ5CLZ0vgYXL0cHAAAA8GZoRgQAAABwhYOaLZ2DaZ/rdDHeMe877/qN+zR73g66efMBwduj1+vp69X76erftwjgXXX6l79o0bLdFBISSm/SnTuPaP7i7+V98i548SKEFi79gc7+epUA3oaN3x2jnT+cpjdPunWNfrBlMGix9fow8jb8wdmj3yJatHw3gaVbtx7SkhU/yge9u+l0Oho9cT19t+0EeYqfjl2kbzb9RO7Cx+bvF/+ldxmvX62G4ylu8o8oUepWtG3nSXqfDRz2FXX8ZK567S/RmxT85Dl16Tmfzp77m9ztz79u0JcLdtodh4/9Tt3n0YChK+ht87Zj8H3nzPHHXzoafPQF1W/2Bb15Bg617MZTLlW/L1jyA2nxGsqff+Km9EFQT+rQ7Uv67/o98hQPHz6hv6/dtniuTcsKNHp4M2rbqiK9LdbW611w6/ZDat/1Szr28x9Rmi6621O2VG46eOQ3csWyr/fKMVqwRP9IwzLk7CzDNmyMWoDEb+yLl/5HL1+GWDw/esJ6FRD9SO4yfPRqWvrVXnqXNW41hZ48fU5rV/SlKRM+ 85, 90, 88],\n    isEnrolled: true\n};\n\nconsole.log(&quot;Student Profile:&quot;);\nconsole.log(&quot;Name: &quot; + student.firstName + &quot; &quot; + student.lastName);\nconsole.log(&quot;Age: &quot; + student.age);\nconsole.log(&quot;Grade: &quot; + student.grade);\nconsole.log(&quot;Scores: &quot; + student.scores);\nconsole.log(&quot;Enrolled: &quot; + student.isEnrolled);\n\n// Output:\n// Student Profile:\n// Name: Maria Santos\n// Age: 15\n// Grade: 9\n// Scores: 85,90,88\n// Enrolled: true\n</code></pre>"},{"html":"<h2>Object Methods - Functions Inside Objects</h2>\n<p>Objects can have <strong>functions</strong> as properties! These are called <strong>methods</strong>.</p>\n<pre><code class=\"language-javascript\">let student = {\n    name: &quot;Maria Santos&quot;,\n    scores: [85, 90, 88],\n    \n    // Method: function inside object\n    getAverage: function() {\n        let sum = 0;\n        for (let i = 0; i &lt; this.scores.length; i++) {\n            sum += this.scores[i];\n        }\n        return sum / this.scores.length;\n    },\n    \n    greet: function() {\n        return &quot;Hello, I&#39;m &quot; + this.name;\n    }\n};\n\n// Call the methods\nconsole.log(student.greet());        // Hello, I&#39;m Maria Santos\nconsole.log(student.getAverage());   // 87.666...\n</code></pre>\n<p><strong>The <code>this</code> keyword</strong> refers to the current object.</p>\n<h3><strong>Real Example: Product with Tax Calculator</strong></h3>\n<pre><code class=\"language-javascript\">let product = {\n    name: &quot;Laptop&quot;,\n    price: 25000,\n    taxRate: 0.12,  // 12% VAT\n    \n    getPriceWithTax: function() {\n        return this.price * (1 + this.taxRate);\n    },\n    \n    getInfo: function() {\n        return this.name + &quot; - ₱&quot; + this.price;\n    }\n};\n\nconsole.log(product.getInfo());\nconsole.log(&quot;With tax: ₱&quot; + product.getPriceWithTax());\n\n// Output:\n// Laptop - ₱25000\n// With tax: ₱28000\n</code></pre>\n<h3><strong>Real Example: Bank Account</strong></h3>\n<pre><code class=\"language-javascript\">let account = {\n    owner: &quot;Maria Santos&quot;,\n    balance: 5000,\n    \n    deposit: function(amount) {\n        this.balance += amount;\n        console.log(&quot;Deposited ₱&quot; + amount);\n        console.log(&quot;New balance: ₱&quot; + this.balance);\n    },\n    \n    withdraw: function(amount) {\n        if (amount &gt; this.balance) {\n            console.log(&quot;Insufficient funds! ❌&quot;);\n        } else {\n            this.balance -= amount;\n            console.log(&quot;Withdrew ₱&quot; + amount);\n            console.log(&quot;New balance: ₱&quot; + this.balance);\n        }\n    },\n    \n    getBalance: function() {\n        return this.balance;\n    }\n};\n\naccount.deposit(1000);   // Deposited ₱1000, New balance: ₱6000\naccount.withdraw(2000);  // Withdrew ₱2000, New balance: ₱4000\naccount.withdraw(5000);  // Insufficient funds! ❌\n</code></pre>"},{"html":"<h2>Practice: Create a Student Object</h2>\n<p><strong>Challenge:</strong> Create a student object with properties and a method to check if they passed.</p>\n<p><strong>Try it yourself! Solution:</strong></p>\n<pre><code class=\"language-javascript\">let student = {\n    name: &quot;Jose Cruz&quot;,\n    studentID: 12345,\n    scores: [85, 78, 90],\n    passingGrade: 75,\n    \n    getAverage: function() {\n        let sum = this.scores.reduce(function(total, score) {\n            return total + score;\n        }, 0);\n        return sum / this.scores.length;\n    },\n    \n    hasPassed: function() {\n        return this.getAverage() &gt;= this.passingGrade;\n    },\n    \n    getReport: function() {\n        let avg = this.getAverage();\n        let status = this.hasPassed() ? &quot;PASSED ✅&quot; : &quot;NOT YET ❌&quot;;\n        \n        console.log(&quot;=================================&quot;);\n        console.log(&quot;STUDENT REPORT&quot;);\n        console.log(&quot;=================================&quot;);\n        console.log(&quot;Name: &quot; + this.name);\n        console.log(&quot;ID: &quot; + this.studentID);\n        console.log(&quot;Scores: &quot; + this.scores.join(&quot;, &quot;));\n        console.log(&quot;Average: &quot; + avg.toFixed(1));\n        console.log(&quot;Status: &quot; + status);\n        console.log(&quot;=================================&quot;);\n    }\n};\n\nstudent.getReport();\n\n// Output:\n// =================================\n// STUDENT REPORT\n// =================================\n// Name: Jose Cruz\n// ID: 12345\n// Scores: 85, 78, 90\n// Average: 84.3\n// Status: PASSED ✅\n// =================================\n</code></pre>"},{"html":"<h2>Advanced Objects</h2>\n<h3><strong>Object.keys() - Get All Property Names</strong></h3>\n<pre><code class=\"language-javascript\">let student = {\n    name: &quot;Maria&quot;,\n    age: 15,\n    grade: 9\n};\n\nlet keys = Object.keys(student);\nconsole.log(keys);  // [&quot;name&quot;, &quot;age&quot;, &quot;grade&quot;]\n\n// Loop through properties\nkeys.forEach(function(key) {\n    console.log(key + &quot;: &quot; + student[key]);\n});\n\n// Output:\n// name: Maria\n// age: 15\n// grade: 9\n</code></pre>\n<h3><strong>Object.values() - Get All Values</strong></h3>\n<pre><code class=\"language-javascript\">let scores = {\n    math: 85,\n    english: 90,\n    science: 88\n};\n\nlet values = Object.values(scores);\nconsole.log(values);  // [85, 90, 88]\n\n// Calculate average\nlet sum = values.reduce(function(total, score) {\n    return total + score;\n}, 0);\nlet average = sum / values.length;\n\nconsole.log(&quot;Average: &quot; + average);  // Average: 87.666...\n</code></pre>\n<h3><strong>Object.entries() - Get Key-Value Pairs</strong></h3>\n<pre><code class=\"language-javascript\">let prices = {\n    coke: 20,\n    bread: 5,\n    crackers: 15\n};\n\nlet entries = Object.entries(prices);\nconsole.log(entries);\n// [[&quot;coke&quot;, 20], [&quot;bread&quot;, 5], [&quot;crackers&quot;, 15]]\n\n// Display nicely\nentries.forEach(function(entry) {\n    let item = entry[0];\n    let price = entry[1];\n    console.log(item + &quot;: ₱&quot; + price);\n});\n\n// Output:\n// coke: ₱20\n// bread: ₱5\n// crackers: ₱15\n</code></pre>"},{"html":"<h2>Arrays of Objects - Powerful Combination!</h2>\n<p>The <strong>most common</strong> data structure in real applications!</p>\n<pre><code class=\"language-javascript\">let students = [\n    {\n        name: &quot;Maria Santos&quot;,\n        age: 15,\n        grade: 9,\n        average: 87\n    },\n    {\n        name: &quot;Jose Cruz&quot;,\n        age: 15,\n        grade: 9,\n        average: 84\n    },\n    {\n        name: &quot;Ana Reyes&quot;,\n        age: 14,\n        grade: 9,\n        average: 91\n    }\n];\n\n// Access individual students\nconsole.log(students[0].name);  // Maria Santos\nconsole.log(students[1].average);  // 84\n\n// Loop through all students\nstudents.forEach(function(student) {\n    console.log(student.name + &quot; - Average: &quot; + student.average);\n});\n\n// Output:\n// Maria Santos - Average: 87\n// Jose Cruz - Average: 84\n// Ana Reyes - Average: 91\n</code></pre>\n<h3><strong>Filter Students</strong></h3>\n<pre><code class=\"language-javascript\">let students = [\n    { name: &quot;Maria&quot;, average: 87 },\n    { name: &quot;Jose&quot;, average: 72 },\n    { name: &quot;Ana&quot;, average: 91 },\n    { name: &quot;Pedro&quot;, average: 68 }\n];\n\n// Find honor students (average ≥ 85)\nlet honorStudents = students.filter(function(student) {\n    return student.average &gt;= 85;\n});\n\nconsole.log(&quot;Honor Students:&quot;);\nhonorStudents.forEach(function(student) {\n    console.log(&quot;- &quot; + student.name + &quot; (&quot; + student.average + &quot;)&quot;);\n});\n\n// Output:\n// Honor Students:\n// - Maria (87)\n// - Ana (91)\n</code></pre>\n<h3><strong>Sort Students</strong></h3>\n<pre><code class=\"language-javascript\">let students = [\n    { name: &quot;Maria&quot;, average: 87 },\n    { name: &quot;Jose&quot;, average: 72 },\n    { name: &quot;Ana&quot;, average: 91 },\n    { name: &quot;Pedro&quot;, average: 68 }\n];\n\n// Sort by average (highest first)\nstudents.sort(function(a, b) {\n    return b.average - a.average;\n});\n\nconsole.log(&quot;Class Ranking:&quot;);\nstudents.forEach(function(student, index) {\n    console.log((index + 1) + &quot;. &quot; + student.name + &quot; - &quot; + student.average);\n});\n\n// Output:\n// Class Ranking:\n// 1. Ana - 91\n// 2. Maria - 87\n// 3. Jose - 72\n// 4. Pedro - 68\n</code></pre>\n<h3><strong>Real Example: Product Inventory</strong></h3>\n<pre><code class=\"language-javascript\">let inventory = [\n    { name: &quot;Coke Sakto&quot;, price: 20, stock: 50 },\n    { name: &quot;Pan de sal&quot;, price: 5, stock: 100 },\n    { name: &quot;Skyflakes&quot;, price: 15, stock: 30 },\n    { name: &quot;Lucky Me&quot;, price: 15, stock: 0 }\n];\n\n// Show available products\nconsole.log(&quot;AVAILABLE PRODUCTS:&quot;);\nconsole.log(&quot;==================&quot;);\n\nlet available = inventory.filter(function(product) {\n    return product.stock &gt; 0;\n});\n\navailable.forEach(function(product) {\n    console.log(product.name + &quot; - ₱&quot; + product.price + &quot; (&quot; + product.stock + &quot; in stock)&quot;);\n});\n\n// Calculate total inventory value\nlet totalValue = inventory.reduce(function(sum, product) {\n    return sum + (product.price * product.stock);\n}, 0);\n\nconsole.log(&quot;==================&quot;);\nconsole.log(&quot;Total inventory value: ₱&quot; + totalValue);\n\n// Output:\n// AVAILABLE PRODUCTS:\n// ==================\n// Coke Sakto - ₱20 (50 in stock)\n// Pan de sal - ₱5 (100 in stock)\n// Skyflakes - ₱15 (30 in stock)\n// ==================\n// Total inventory value: ₱1950\n</code></pre>"},{"html":"<h2>Real-World Project: Sari-Sari Store System</h2>\n<p>Let&#39;s build a complete inventory management system! 🏪</p>\n<p><img ry: &quot;snacks&quot; }\n    ],\n    \n    // Show all products\n    showInventory: function() {\n        console.log(&quot;========================================&quot;);\n        console.log(this.name.toUpperCase());\n        console.log(this.location);\n        console.log(&quot;========================================&quot;);\n        console.log();\n        \n        this.inventory.forEach(function(product) {\n            let status = product.stock &gt; 0 ? &quot;✅&quot; : &quot;❌ OUT OF STOCK&quot;;\n            console.log(product.id + &quot;. &quot; + product.name);\n            console.log(&quot;   ₱&quot; + product.price + &quot; | Stock: &quot; + product.stock + &quot; &quot; + status);\n        });\n    },\n    \n    // Find product by ID\n    findProduct: function(id) {\n        return this.inventory.find(function(product) {\n            return product.id === id;\n        });\n    },\n    \n    // Sell a product\n    sellProduct: function(id, quantity) {\n        let product = this.findProduct(id);\n        \n        if (!product) {\n            console.log(&quot;❌ Product not found!&quot;);\n            return;\n        }\n        \n        if (product.stock &lt; quantity) {\n            console.log(&quot;❌ Not enough stock! Only &quot; + product.stock + &quot; available.&quot;);\n            return;\n        }\n        \n        product.stock -= quantity;\n        let total = product.price * quantity;\n        \n        console.log(&quot;✅ SALE SUCCESSFUL&quot;);\n        console.log(&quot;Product: &quot; + product.name);\n        console.log(&quot;Quantity: &quot; + quantity);\n        console.log(&quot;Total: ₱&quot; + total);\n        console.log(&quot;Remaining stock: &quot; + product.stock);\n    },\n    \n    // Restock a product\n    restock: function(id, quantity) {\n        let product = this.findProduct(id);\n        \n        if (!product) {\n            console.log(&quot;❌ Product not found!&quot;);\n            return;\n        }\n        \n        product.stock += quantity;\n        console.log(&quot;✅ RESTOCKED: &quot; + product.name);\n        console.log(&quot;New stock: &quot; + product.stock);\n    },\n    \n    // Get products by category\n    getByCategory: function(category) {\n        return this.inventory.filter(function(product) {\n            return product.category === category &amp;&amp; product.stock &gt; 0;\n        });\n    },\n    \n    // Calculate total inventory value\n    getTotalValue: function() {\n        return this.inventory.reduce(function(sum, product) {\n            return sum + (product.price * product.stock);\n        }, 0);\n    },\n    \n    // Get low stock alerts\n    getLowStockAlerts: function(threshold) {\n        if (threshold === undefined) {\n            threshold = 20;  // Default threshold\n        }\n        \n        return this.inventory.filter(function(product) {\n            return product.stock &gt; 0 &amp;&amp; product.stock &lt;= threshold;\n        });\n    },\n    \n    // Get bestsellers (by stock sold - you&#39;d track this in real app)\n    getMostExpensiveProducts: function(count) {\n        let sorted = this.inventory.slice().sort(function(a, b) {\n            return b.price - a.price;\n        });\n        return sorted.slice(0, count);\n    }\n};\n\n// ========================================\n// TESTING THE SYSTEM\n// ========================================\n\nconsole.log(&quot;\\n📦 INVENTORY STATUS&quot;);\nstore.showInventory();\n\nconsole.log(&quot;\\n\\n💰 TRANSACTIONS&quot;);\nconsole.log(&quot;================&quot;);\nstore.sellProduct(1, 3);  // Sell 3 Coke Sakto\n\nconsole.log(&quot;\\n&quot;);\nstore.sellProduct(2, 5);  // Sell 5 Pan de sal\n\nconsole.log(&quot;\\n&quot;);\nstore.sellProduct(5, 1);  // Try to sell out-of-stock item\n\nconsole.log(&quot;\\n\\n📦 RESTOCKING&quot;);\nconsole.log(&quot;===============&quot;);\nstore.restock(5, 25);  // Restock Chippy\n\nconsole.log(&quot;\\n\\n🔍 CATEGORY: SNACKS&quot;);\nconsole.log(&quot;===================&quot;);\nlet snacks = store.getByCategory(&quot;snacks&quot;);\nsnacks.forEach(function(product) {\n    console.log(product.name + &quot; - ₱&quot; + product.price);\n});\n\n![Funnel diagram showing filtering products by category and stock availability to get final available list](diagrams/js-arrays-objects/category-filter.png)\n\nconsole.log(&quot;\\n\\n⚠️ LOW STOCK ALERTS&quot;);\nconsole.log(&quot;===================&quot;);\nlet lowStock = store.getLowStockAlerts(30);\nlowStock.forEach(function(product) {\n    console.log(&quot;⚠️ &quot; + product.name + &quot; - Only &quot; + product.stock + &quot; left!&quot;);\n});\n\nconsole.log(&quot;\\n\\n💎 MOST EXPENSIVE PRODUCTS&quot;);\nconsole.log(&quot;==========================&quot;);\nlet expensive = store.getMostExpensiveProducts(3);\nexpensive.forEach(function(product) {\n    console.log(product.name + &quot; - ₱&quot; + product.price);\n});\n\nconsole.log(&quot;\\n\\n💵 TOTAL INVENTORY VALUE&quot;);\nconsole.log(&quot;========================&quot;);\nconsole.log(&quot;₱&quot; + store.getTotalValue());\n</code></pre>\n<p><strong>Output:</strong></p>\n<pre><code>📦 INVENTORY STATUS\n========================================\nALING MARIA&#39;S STORE\nBarangay Masaya\n========================================\n\n1. Coke Sakto\n   ₱20 | Stock: 50 ✅\n2. Pan de sal\n   ₱5 | Stock: 100 ✅\n3. Skyflakes\n   ₱15 | Stock: 30 ✅\n4. Lucky Me\n   ₱15 | Stock: 45 ✅\n5. Chippy\n   ₱10 | Stock: 0 ❌ OUT OF STOCK\n\n\n💰 TRANSACTIONS\n================\n✅ SALE SUCCESSFUL\nProduct: Coke Sakto\nQuantity: 3\nTotal: ₱60\nRemaining stock: 47\n\n✅ SALE SUCCESSFUL\nProduct: Pan de sal\nQuantity: 5\nTotal: ₱25\nRemaining stock: 95\n\n❌ Not enough stock! Only 0 available.\n\n\n📦 RESTOCKING\n===============\n✅ RESTOCKED: Chippy\nNew stock: 25\n\n\n🔍 CATEGORY: SNACKS\n===================\nSkyflakes - ₱15\nChippy - ₱10\n\n\n⚠️ LOW STOCK ALERTS\n===================\n⚠️ Chippy - Only 25 left!\n\n\n💎 MOST EXPENSIVE PRODUCTS\n==========================\nCoke Sakto - ₱20\nSkyflakes - ₱15\nLucky Me - ₱15\n\n\n💵 TOTAL INVENTORY VALUE\n========================\n₱2165\n</code></pre>\n<p><strong>Congratulations!</strong> You just built a complete business application! 🎉</p>"},{"html":"<h2>Arrow Functions (Modern JavaScript)</h2>\n<p>You&#39;ve been writing functions like this:</p>\n<pre><code class=\"language-javascript\">let numbers = [1, 2, 3, 4];\n\nlet doubled = numbers.map(function(num) {\n    return num * 2;\n});\n</code></pre>\n<p><strong>Modern JavaScript</strong> has a shorter way called <strong>arrow functions</strong>:</p>\n<pre><code class=\"language-javascript\">let numbers = [1, 2, 3, 4];\n\nlet doubled = numbers.map((num) =&gt; {\n    return num * 2;\n});\n\n// Even shorter for one line:\nlet doubled = numbers.map(num =&gt; num * 2);\n</code></pre>\n<h3><strong>Comparison</strong></h3>\n<pre><code class=\"language-javascript\">// Traditional function\nscores.forEach(function(score) {\n    console.log(score);\n});\n\n// Arrow function (same thing!)\nscores.forEach((score) =&gt; {\n    console.log(score);\n});\n\n// Arrow function (single parameter, no parentheses)\nscores.forEach(score =&gt; {\n    console.log(score);\n});\n</code></pre>\n<h3><strong>When to Use Each</strong></h3>\n<p><strong>Traditional functions:</strong></p>\n<ul>\n<li>✅ When you need <code>this</code> to refer to the object</li>\n<li>✅ When learning (easier to read)</li>\n<li>✅ Object methods</li>\n</ul>\n<p><strong>Arrow functions:</strong></p>\n<ul>\n<li>✅ Array methods (map, filter, forEach, etc.)</li>\n<li>✅ Shorter callbacks</li>\n<li>✅ Modern code style</li>\n</ul>\n<p><strong>Both are correct!</strong> Use what you&#39;re comfortable with. 😊</p>"},{"html":"<h2>Summary - What You Learned Today</h2>\n<p><strong>You now know:</strong></p>\n<h3><strong>Arrays</strong> 📦</h3>\n<ul>\n<li>✅ Create and access arrays</li>\n<li>✅ Add/remove items (push, pop, shift, unshift)</li>\n<li>✅ Loop through arrays (forEach)</li>\n<li>✅ Transform arrays (map)</li>\n<li>✅ Filter arrays (filter)</li>\n<li>✅ Find items (find, includes)</li>\n<li>✅ Combine items (reduce)</li>\n<li>✅ Sort arrays (sort)</li>\n<li>✅ Copy arrays (slice)</li>\n</ul>\n<h3><strong>Objects</strong> 🗂️</h3>\n<ul>\n<li>✅ Create objects with properties</li>\n<li>✅ Access properties (dot and bracket notation)</li>\n<li>✅ Create methods (functions in objects)</li>\n<li>✅ Use <code>this</code> keyword</li>\n<li>✅ Get keys, values, entries</li>\n<li>✅ Combine arrays and objects</li>\n</ul>\n<p><strong>You can now:</strong></p>\n<ul>\n<li>🚀 Build a complete inventory system</li>\n<li>🚀 Manage lists of data efficiently</li>\n<li>🚀 Process data with powerful methods</li>\n<li>🚀 Create real-world applications</li>\n</ul>\n<p><strong>This is huge!</strong> You&#39;ve learned the most important tools in JavaScript! 🎯</p>"},{"html":"<h2>Common Mistakes &amp; Tips</h2>\n<h3><strong>Mistake 1: Modifying Arrays While Looping</strong></h3>\n<pre><code class=\"language-javascript\">// ❌ Don&#39;t do this\nlet numbers = [1, 2, 3, 4];\nfor (let i = 0; i &lt; numbers.length; i++) {\n    numbers.pop();  // Changes the array during loop!\n}\n\n// ✅ Use filter instead\nlet numbers = [1, 2, 3, 4];\nnumbers = numbers.filter(num =&gt; num &gt; 2);\n</code></pre>\n<h3><strong>Mistake 2: Forgetting Return in map()</strong></h3>\n<pre><code class=\"language-javascript\">// ❌ Returns undefined\nlet doubled = numbers.map(num =&gt; {\n    num * 2;  // Forgot return!\n});\n\n// ✅ Return the value\nlet doubled = numbers.map(num =&gt; {\n    return num * 2;\n});\n\n// ✅ Or use short syntax\nlet doubled = numbers.map(num =&gt; num * 2);\n</code></pre>\n<h3><strong>Mistake 3: Mutating Original Array</strong></h3>\n<pre><code class=\"language-javascript\">// ❌ Changes original\nlet scores = [85, 90, 78];\nscores.sort();\nconsole.log(scores);  // Original is changed!\n\n// ✅ Make a copy first\nlet scores = [85, 90, 78];\nlet sorted = scores.slice().sort();\nconsole.log(scores);  // Original unchanged\nconsole.log(sorted);  // Sorted copy\n</code></pre>\n<h3><strong>Mistake 4: Confusing Array and Object Syntax</strong></h3>\n<pre><code class=\"language-javascript\">// Array uses [ ]\nlet students = [&quot;Maria&quot;, &quot;Jose&quot;];\nconsole.log(students[0]);\n\n// Object uses { }\nlet student = { name: &quot;Maria&quot;, age: 15 };\nconsole.log(student.name);\n</code></pre>\n<h3><strong>Pro Tips</strong> 💡</h3>\n<ol>\n<li><p><strong>Use const for arrays/objects that won&#39;t be reassigned</strong></p>\n<pre><code class=\"language-javascript\">const students = [];  // Can still push/pop\nstudents.push(&quot;Maria&quot;);  // ✅ OK\nstudents = [&quot;Ana&quot;];  // ❌ Error\n</code></pre>\n</li>\n<li><p><strong>Chain array methods for powerful operations</strong></p>\n<pre><code class=\"language-javascript\">let result = scores\n    .filter(score =&gt; score &gt;= 75)\n    .map(score =&gt; score + 5)\n    .sort((a, b) =&gt; b - a);\n</code></pre>\n</li>\n<li><p><strong>Use meaningful names</strong></p>\n<pre><code class=\"language-javascript\">// ❌ Unclear\narr.forEach(x =&gt; console.log(x));\n\n// ✅ Clear\nstudents.forEach(student =&gt; console.log(student.name));\n</code></pre>\n</li>\n<li><p><strong>Console.log() is your friend!</strong></p>\n<pre><code class=\"language-javascript\">let result = scores\n    .filter(score =&gt; {\n        console.log(&quot;Checking:&quot;, score);  // Debug!\n        return score &gt;= 75;\n    });\n</code></pre>\n</li>\n</ol>"},{"html":"<h2>Final Challenge: Complete System</h2>\n<p>Build a <strong>Student Management System</strong> with everything you learned!</p>\n<p><strong>Requirements:</strong></p>\n<ol>\n<li>Array of student objects (name, scores, attendance)</li>\n<li>Calculate averages</li>\n<li>Find honor students (average ≥ 90)</li>\n<li>Sort by average</li>\n<li>Check attendance status</li>\n<li>Generate reports</li>\n</ol>\n<p><strong>Try it yourself! Solutio
