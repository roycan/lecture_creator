    <style>
        /* Theme Variables */
        :root {
            --bg-color: #1a1a1a;
            --text-color: #fff;
            --text-shadow: rgba(0, 0, 0, 0.5);
            --code-bg: #333;
            --pre-bg: #2d2d2d;
            --overlay-bg: rgba(0, 0, 0, 0.95);
            --overlay-panel: rgba(255, 255, 255, 0.03);
            --border-color: #555;
            --input-bg: #2d2d2d;
            --subtle-bg: rgba(255, 255, 255, 0.05);
            --shadow-light: rgba(255, 255, 255, 0.2);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --progress-bg: rgba(0, 0, 0, 0.85);
        }
        
        :root[data-theme="light"] {
            --bg-color: #f5f5f5;
            --text-color: #1a1a1a;
            --text-shadow: rgba(255, 255, 255, 0.5);
            --code-bg: #e0e0e0;
            --pre-bg: #e8e8e8;
            --overlay-bg: rgba(245, 245, 245, 0.98);
            --overlay-panel: rgba(0, 0, 0, 0.03);
            --border-color: #ccc;
            --input-bg: #fff;
            --subtle-bg: rgba(0, 0, 0, 0.05);
            --shadow-light: rgba(0, 0, 0, 0.1);
            --shadow-dark: rgba(0, 0, 0, 0.2);
            --progress-bg: rgba(255, 255, 255, 0.90);
        }
        
        * { box-sizing: border-box; }
        body, html {
            height: 100%;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        #slide-container {
            width: 100%;
            min-height: 100vh;
            height: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            padding: 3rem 2rem 200px 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        #slide-container h1 { font-size: 2.5em; margin: 0.5em 0; text-shadow: 2px 2px 4px var(--text-shadow); }
        #slide-container h2 { font-size: 2em; margin: 0.5em 0; text-shadow: 2px 2px 4px var(--text-shadow); }
        #slide-container h3 { font-size: 1.5em; margin: 0.5em 0; }
        #slide-container p { font-size: 1.2em; line-height: 1.6; max-width: 800px; margin: 0.5em auto; }
        #slide-container img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5rem 0; }
        #slide-container ul, #slide-container ol { text-align: left; max-width: 600px; margin: 1em auto; font-size: 1.1em; }
        #slide-container code { background: var(--code-bg); padding: 0.2em 0.4em; border-radius: 3px; }
        #slide-container pre { 
            background: var(--pre-bg); 
            padding: 1em; 
            border-radius: 8px; 
            overflow-x: visible; 
            text-align: left;
            font-family: 'Courier New', Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace;
            font-size: 0.8em;
            line-height: 1.4;
            max-width: 100%;
            white-space: pre;
        }
        
        #slide-container pre code {
            font-family: inherit;
            font-size: inherit;
            background: transparent;
            padding: 0;
        }
        
        /* Start Overlay */
        #start-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 1000;
        }
        
        #status-message {
            font-size: 1.1em;
            color: #aaa;
            margin: 0;
            min-height: 1.5em;
        }
        
        #status-message.success { color: #4CAF50; }
        #status-message.warning { color: #FF9800; }
        #status-message.error { color: #f44336; }
        
        /* Mode Selection */
        #mode-selection {
            margin: 1.5em 0;
            width: 100%;
            max-width: 500px;
        }
        
        #mode-selection fieldset {
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 1em;
            background: var(--overlay-panel);
        }
        
        #mode-selection legend {
            padding: 0 0.5em;
            color: #4CAF50;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .mode-option {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .mode-option:hover {
            background: var(--subtle-bg);
        }
        
        .mode-option input[type="radio"] {
            margin-top: 4px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .mode-option-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .mode-option strong {
            font-size: 1.1em;
            color: var(--text-color);
        }
        
        .mode-option small {
            font-size: 0.85em;
            color: #aaa;
            line-height: 1.3;
        }
        
        #controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            padding: 1em;
            background: var(--subtle-bg);
            border-radius: 8px;
        }
        
        #voice-controls-container.hidden {
            display: none;
        }
        
        #voice-select {
            min-width: 200px;
            padding: 0.5em;
            font-size: 1em;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            color: var(--text-color);
        }
        
        label {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.9em;
            color: #ccc;
        }
        
        input[type="range"] {
            width: 120px;
        }
        
        #start-button {
            font-size: 1.3em;
            padding: 0.8em 2em;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        #start-button:hover:not(:disabled) {
            background: #45a049;
            transform: scale(1.05);
        }
        
        #start-button:disabled {
            background: #555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* Navigation Controls */
        #nav-controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        #nav-controls.visible { display: flex; }
        
        #progress-indicator {
            background: var(--progress-bg);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        
        .nav-button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(76, 175, 80, 0.9);
            color: white;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .nav-button:hover { background: rgba(69, 160, 73, 1); transform: scale(1.05); }
        .nav-button:disabled { background: rgba(85, 85, 85, 0.5); cursor: not-allowed; }
        
        #pause-button {
            background: rgba(255, 152, 0, 0.9);
        }
        
        #pause-button:hover:not(:disabled) {
            background: rgba(245, 124, 0, 1);
        }
        
        #pause-button.paused {
            background: rgba(76, 175, 80, 0.9);
        }
        
        #pause-button.paused:hover {
            background: rgba(69, 160, 73, 1);
        }
        
        #pause-button.hidden {
            display: none;
        }
        
        /* Speed Control */
        .speed-control {
            background: var(--progress-bg);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9em;
        }
        
        .speed-control label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            cursor: default;
        }
        
        #speed-slider {
            width: 100px;
            height: 6px;
            cursor: pointer;
            background: var(--shadow-light);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
        }
        
        #speed-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: #4CAF50;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }
        
        #speed-value {
            font-weight: bold;
            min-width: 45px;
            text-align: right;
            color: #4CAF50;
        }
        
        .speed-control.hidden {
            display: none;
        }
        
        /* Keyboard Hint */
        .keyboard-hint {
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            border-radius: 6px;
            font-size: 0.85em;
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        
        .keyboard-hint kbd {
            background: var(--shadow-dark);
            padding: 2px 6px;
            border-radius: 3px;
            border: 1px solid var(--shadow-light);
            font-family: monospace;
            font-size: 0.9em;
        }
        
        /* Theme Toggle Button */
        #theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: var(--subtle-bg);
            color: var(--text-color);
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s;
            z-index: 1001;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        #theme-toggle:hover {
            background: var(--code-bg);
            transform: scale(1.05);
        }
        
        #theme-toggle .theme-icon {
            font-size: 1.3em;
        }
        
        /* Speed Toast Notification */
        #speed-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 1.5rem 3rem;
            border-radius: 12px;
            font-size: 1.8em;
            font-weight: bold;
            z-index: 10000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            border: 2px solid #4CAF50;
        }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            #slide-container { padding: 2rem 1rem; }
            #slide-container h1 { font-size: 1.8em; }
            #slide-container h2 { font-size: 1.5em; }
            #slide-container p { font-size: 1em; }
            #controls { flex-direction: column; }
            #nav-controls { bottom: 10px; right: 10px; }
            
            #speed-slider {
                width: 150px;
            }
            
            .nav-button {
                padding: 10px 16px;
                font-size: 0.9em;
            }
            
            #speed-toast {
                font-size: 1.5em;
                padding: 1rem 2rem;
            }
            
            /* Mermaid Error Messages */
            .mermaid-error {
                background: rgba(244, 67, 54, 0.1);
                border-left: 4px solid #f44336;
                padding: 10px 15px;
                margin: 10px 0;
                border-radius: 4px;
                color: #f44336;
                font-size: 0.9em;
                text-align: left;
            }
            
            .mermaid-error::before {
                content: '⚠️ ';
                font-weight: bold;
            }
        }
    </style>

    <script id="slides-data" type="application/json">[{"html":"<h1>Asynchronous JavaScript — Fetch Data Like a Pro 🚀</h1>\n<p>Welcome! 🎉</p>\n<p>This lecture teaches you how to fetch data from servers, APIs, and files without freezing your web page. You&#39;ll learn Promises, the Fetch API, async/await, and how to handle errors like a professional developer. Perfect for building weather apps, search tools, and data dashboards!</p>\n<p>Estimated length: ~2,200 lines. Focus: analogies, visual diagrams, hands-on practice with local and live data.</p>\n<hr>"},{"html":"<h2>Quick Plan (What We&#39;ll Cover)</h2>\n<ul>\n<li>Understanding asynchronous code: why JavaScript doesn&#39;t &quot;wait&quot;</li>\n<li>Promises: pending, fulfilled, rejected states</li>\n<li>Fetch API: getting data from files and servers</li>\n<li>Async/await: modern, readable async code</li>\n<li>JSON: parsing and working with data</li>\n<li>Error handling: network failures, loading states</li>\n<li>Real-world patterns: search, debounce, pagination</li>\n<li>Mini projects: Weather Dashboard, Barangay Directory, Quiz App</li>\n<li>Final challenge: Data Dashboard (school/store/transport themes)</li>\n</ul>\n<hr>"},{"html":"<h2>Introduction — Why Asynchronous?</h2>\n<p>Imagine you&#39;re at a <strong>Jollibee counter</strong>. Two scenarios:</p>\n<p><strong>❌ Synchronous (Blocking):</strong>\nYou order Chickenjoy. The cashier stops everything, goes to the kitchen, waits for your food (5 minutes), brings it back, then serves the next customer. Everyone waits!</p>\n<p><strong>✅ Asynchronous (Non-blocking):</strong>\nYou order Chickenjoy. The cashier gives you a number, serves the next customer immediately. When your food is ready, they call your number. Nobody waits!</p>\n<p>JavaScript works the <strong>asynchronous way</strong>. When you fetch data from a server, JavaScript doesn&#39;t freeze and wait. It gives you a &quot;promise&quot; that the data will arrive later, then continues running other code.</p>\n<h3>📁 Shared Stylesheet Reference</h3>\n<p>All practice files use our shared stylesheet from the DOM lecture:</p>\n<p><strong>File:</strong> <a href=\"assets/ajax-fetch/styles.css\"><code>assets/styles.css</code></a></p>\n<hr>"},{"html":"<h2>Section 1 — Understanding Asynchronous Code</h2>\n<h3>The Problem with Waiting</h3>\n<p>Try this code:</p>\n<pre><code class=\"language-javascript\">console.log(&#39;Start&#39;);\n// Imagine this takes 3 seconds...\nconsole.log(&#39;Fetching data from server...&#39;);\nconsole.log(&#39;End&#39;);\n</code></pre>\n<p>In synchronous code, everything stops during the &quot;fetch&quot;. In JavaScript, we use <strong>callbacks</strong>, <strong>Promises</strong>, or <strong>async/await</strong> to handle &quot;later&quot; events.</p>\n<h3>The Simplest Async Example: setTimeout</h3>\n<pre><code class=\"language-javascript\">console.log(&#39;Ordering food...&#39;);\n\nsetTimeout(function() {\n  console.log(&#39;Your Chickenjoy is ready!&#39;);\n}, 3000); // 3 seconds later\n\nconsole.log(&#39;Cashier serves next customer&#39;);\n</code></pre>\n<p><strong>Output:</strong></p>\n<pre><code>Ordering food...\nCashier serves next customer\nYour Chickenjoy is ready!  // 3 seconds later\n</code></pre>\n<p>Notice: JavaScript didn&#39;t wait for <code>setTimeout</code>. It continued to the next line!</p>\n<h3>Enter Promises</h3>\n<p>A <strong>Promise</strong> is like a claim stub. You don&#39;t have your item yet, but you have a promise it will be ready (or fail).</p>\n<p>Three states:</p>\n<ol>\n<li><strong>Pending</strong> ⏳ — waiting (food is cooking)</li>\n<li><strong>Fulfilled</strong> ✅ — success (you got your food)</li>\n<li><strong>Rejected</strong> ❌ — failure (kitchen ran out of Chickenjoy)</li>\n</ol>\n<p><strong>Visual: Promise State Machine</strong></p>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAA2EAAAIMCAYAAAB8EaQPAAAQAElEQVR4nOzdB3gUVRfG8bPpCZDQeyd0CCkIYu9iQSyggIiFLogIKPauoKJSFWmiCAiioiI2RIrSUwiIdBDpPSGkZ/c7 )</code> — runs when fulfilled</li>\n<li><code>.catch(callback)</code> — runs when rejected</li>\n</ul>\n<hr>\n<h3>🎯 Try it yourself — Promise Basics</h3>\n<ul>\n<li>Open: <a href=\"assets/ajax-fetch/promise-basics.html\"><code>assets/promise-basics.html</code></a></li>\n<li>How: Double-click to open in your browser</li>\n</ul>\n<p>Tasks:</p>\n<ol>\n<li>Create a Promise that resolves after 2 seconds</li>\n<li>Chain <code>.then()</code> to log the result</li>\n<li>Create a Promise that rejects and handle with <code>.catch()</code></li>\n</ol>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/promise-basics.html\"><code>promise-basics.html</code></a></p>\n<hr>"},{"html":"<h2>Section 2 — The Fetch API</h2>\n<p>The <code>fetch()</code> function returns a Promise that resolves when data arrives from a server or file.</p>\n<h3>Basic Syntax</h3>\n<pre><code class=\"language-javascript\">fetch(&#39;data.json&#39;)\n  .then(function(response) {\n    return response.json(); // Parse JSON\n  })\n  .then(function(data) {\n    console.log(data); // Use the data\n  })\n  .catch(function(error) {\n    console.log(&#39;Error:&#39;, error);\n  });\n</code></pre>\n<h3>Two-Step Process</h3>\n<p><strong>Step 1:</strong> <code>fetch(url)</code> returns a Promise with a <strong>Response object</strong><br><strong>Step 2:</strong> Call <code>response.json()</code> to parse the body (also returns a Promise)</p>\n<p><strong>Visual: Fetch Lifecycle</strong></p>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAvIAAAL8CAYAAACCkVE8AAAQAElEQVR4nOzdCZxN9f/H8c9sGNvYspPsZJklWbKlhX4KkYi0IpIiIoRBibQQ7dpLWVJpTwuRVjNjabJVKmXLvo7Z/p/PmXvnf2eMMcMwc8zr+Xgc37Ofc8+dGe/zvd/zvf4CAAAAwHX8BQAAAIDrEOQBAAAAFyLIAwAAAC5EkAcAAABciCAPAAAAuBBBHgAAAHAhgjwAAADgQgR5AAAAwIUCBWfcU0M21EtMliv8/PxKCnAKkpOT9wT4yeJB02v/KucYfj9wus7l3w+k4O8ETte5+nfCT3DGPD707+ASIYnL/fykXu2LQoLj45IEOBVBBf1lw8/7jiQny6979wW0vPeJKkfE5fj9QE45F38/kIK/E8gp5+rfCWrkz6BSJRKnVagZHB7RvqwAp6tO0xLBUZ/vDPfbdPhRnRwkLsfvB3LSufb7gRT8nUBOOhf/Tt ta))\n  .catch(error =&gt; console.error(&#39;Error:&#39;, error));\n</code></pre>\n<p><strong>Common status codes:</strong></p>\n<ul>\n<li><code>200</code> — OK (success)</li>\n<li><code>404</code> — Not Found</li>\n<li><code>500</code> — Server Error</li>\n</ul>\n<hr>\n<h3>🎯 Try it yourself — Fetch Demo</h3>\n<ul>\n<li>Open: <a href=\"assets/ajax-fetch/fetch-demo.html\"><code>assets/fetch-demo.html</code></a></li>\n<li>How: Double-click to open in your browser</li>\n</ul>\n<p>Tasks:</p>\n<ol>\n<li>Fetch Philippine provinces from <code>provinces.json</code></li>\n<li>Display them in a list on the page</li>\n<li>Add error handling for missing file</li>\n</ol>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/fetch-demo.html\"><code>fetch-demo.html</code></a><br><strong>Data:</strong> <a href=\"assets/ajax-fetch/provinces.json\"><code>provinces.json</code></a></p>\n<hr>"},{"html":"<h2>Section 3 — Async/Await (Modern Syntax)</h2>\n<p>Promises with <code>.then()</code> chains can get messy. <strong>Async/await</strong> makes async code look synchronous (easier to read).</p>\n<h3>The <code>async</code> Keyword</h3>\n<pre><code class=\"language-javascript\">async function getProvinces() {\n  // This function now returns a Promise automatically\n}\n</code></pre>\n<h3>The <code>await</code> Keyword</h3>\n<pre><code class=\"language-javascript\">async function getProvinces() {\n  const response = await fetch(&#39;assets/provinces.json&#39;);\n  const data = await response.json();\n  console.log(data);\n}\n\ngetProvinces();\n</code></pre>\n<p><strong>What <code>await</code> does:</strong> Pauses the function until the Promise resolves, then returns the value.</p>\n<h3>Side-by-Side Comparison</h3>\n<p><strong>Old way (Promises):</strong></p>\n<pre><code class=\"language-javascript\">fetch(&#39;data.json&#39;)\n  .then(response =&gt; response.json())\n  .then(data =&gt; console.log(data))\n  .catch(error =&gt; console.error(error));\n</code></pre>\n<p><strong>New way rror(`HTTP ${response.status}`);\n    }\n    const data = await response.json();\n    return data;\n  } catch (error) {\n    console.error(&#39;Failed to load provinces:&#39;, error);\n    return []; // Return empty array as fallback\n  }\n}\n</code></pre>\n<hr>\n<h3>🎯 Try it yourself — Async/Await Demo</h3>\n<ul>\n<li>Open: <a href=\"assets/ajax-fetch/async-await-demo.html\"><code>assets/async-await-demo.html</code></a></li>\n<li>How: Double-click to open in your browser</li>\n</ul>\n<p>Tasks:</p>\n<ol>\n<li>Refactor the fetch example to use async/await</li>\n<li>Add try/catch error handling</li>\n<li>Call the function on button click</li>\n</ol>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/async-await-demo.html\"><code>async-await-demo.html</code></a></p>\n<hr>"},{"html":"<h2>Section 4 — Working with JSON</h2>\n<p><strong>JSON</strong> = JavaScript Object Notation. It&#39;s a text format for storing and exchanging data.</p>\n<h3>JSON Structure</h3>\n<pre><code class=\"language-json\">{\n  &quot;name&quot;: &quot;Juan Dela Cruz&quot;,\n  &quot;age&quot;: 15,\n  &quot;grade&quot;: 9,\n  &quot;subjects&quot;: [&quot;Math&quot;, &quot;Science&quot;, &quot;English&quot;],\n  &quot;address&quot;: {\n    &quot;city&quot;: &quot;Manila&quot;,\n    &quot;barangay&quot;: &quot;San Andres&quot;\n  }\n}\n</code></pre>\n<h3>Arrays of Objects (Most Common)</h3>\n<pre><code class=\"language-json\">[\n  {&quot;id&quot;: 1, &quot;name&quot;: &quot;Manila&quot;, &quot;region&quot;: &quot;NCR&quot;},\n  {&quot;id&quot;: 2, &quot;name&quot;: &quot;Cebu&quot;, &quot;region&quot;: &quot;VII&quot;},\n  {&quot;id&quot;: 3, &quot;name&quot;: &quot;Davao&quot;, &quot;region&quot;: &quot;XI&quot;}\n]\n</code></pre>\n<p><strong>Visual: JSON Structure</strong></p>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAACDQAAANYCAYAAAAxZS8SAAAgAElEQVR4XuzdB5hcVfkH4AOkUgIJoRNAEKSDNEHpVekoigIKItKbgPROAOmgiEpvooh0QRD4I0qT3jtIDQkkIY304P98dzNhdrO72STL7t3Z9zzPPrMzc8u57z032d37m+/Mk  {name: &quot;Maria&quot;, age: 14};\nconst json = JSON.stringify(student);\nconsole.log(json); // &#39;{&quot;name&quot;:&quot;Maria&quot;,&quot;age&quot;:14}&#39;\n</code></pre>\n<h3>Common JSON Patterns</h3>\n<p><strong>Student records:</strong></p>\n<pre><code class=\"language-json\">{\n  &quot;students&quot;: [\n    {&quot;id&quot;: 1, &quot;name&quot;: &quot;Ana Santos&quot;, &quot;average&quot;: 88},\n    {&quot;id&quot;: 2, &quot;name&quot;: &quot;Ben Reyes&quot;, &quot;average&quot;: 92}\n  ]\n}\n</code></pre>\n<p><strong>Sari-sari store inventory:</strong></p>\n<pre><code class=\"language-json\">{\n  &quot;products&quot;: [\n    {&quot;name&quot;: &quot;Coke 500ml&quot;, &quot;price&quot;: 25, &quot;stock&quot;: 12},\n    {&quot;name&quot;: &quot;Lucky Me&quot;, &quot;price&quot;: 12, &quot;stock&quot;: 30}\n  ]\n}\n</code></pre>\n<hr>\n<h3>🎯 Try it yourself — JSON Practice</h3>\n<ul>\n<li>Open: <a href=\"assets/ajax-fetch/json-practice.html\"><code>assets/json-practice.html</code></a></li>\n<li>How: Double-click to open in your browser</li>\n</ul>\n<p>Tasks:</p>\n<ol>\n<li>Fetch student records from JSON</li>\n<li>Parse and display in a table</li>\n<li>Calculate class average</li>\n<li>Add a student and stringify to console</li>\n</ol>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/json-practice.html\"><code>json-practice.html</code></a><br><strong>Data:</strong> <a href=\"assets/ajax-fetch/students.json\"><code>students.json</code></a></p>\n<hr>"},{"html":"<h2>Section 5 — Error Handling &amp; Loading States</h2>\n<p>Real apps need to handle three states:</p>\n<ol>\n<li><strong>Loading</strong> ⏳ — show spinner or &quot;Loading...&quot; message</li>\n<li><strong>Success</strong> ✅ — display data</li>\n<li><strong>Error</strong> ❌ — show friendly error message</li>\n</ol>\n<h3>Loading State Pattern</h3>\n<pre><code class=\"language-javascript\">const loadingEl = document.getElementById(&#39;loading&#39;);\nconst resultEl = document.getElementById(&#39;result&#39;);\nconst errorEl = document.getElementById(&#39;error&#39;);\n\nasync function loadData() {\n  // Show loading\n  loadingEl.classList.remove(&#39;hidden&#39;);\n  resultEl.classList.add(&#39;hidden&#39;);\n  errorEl.classList.add(&#39;hidden&#39;);\n  \n  try {\n    const response = await fetch(&#39;data.json&#39;);\n    if (!response.ok) throw new Error(&#39;Network error&#39;);\n    const data = await response.json();\n    \n    // Show success\n    loadingEl.classList.add(&#39;hidden&#39;);\n    resultEl.classList.remove(&#39;hidden&#39;);\n    resultEl.textContent = JSON.stringify(data, null, 2);\n    \n  } catch (error) {\n    // Show error\n    loadingEl.classList.add(&#39;hidden&#39;);\n    errorEl.classList.remove(&#39;hidden&#39;);\n    errorEl.textContent = `Error: ${error.message}`;\n  }\n}\n</code></pre>\n<p><strong>Visual: Error Handling Flow</strong></p>\n<p><img src=\"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAxcAAAPrCAYAAAAqcHFeAAAQAElEQVR4nOzdB3hTdduA8SdJdxllyBLZy0q3C/feirhF3Irzde/xquAWB4obt+DG+YpbnOBIWwoWkKkyZY/ujO/5H0i/AgXaknGS3D+vXKdN0lKwSc59nnNOnAIAAAAAQeAUAAAAAAgC4gIAAABAUBAXAAAAAIKCuAAAAAAQFMQFAAAAgKAgLgAAAAAERYIAQJwadc3sPn6fb7AAW+T48j+P9fpJAAANQlwAiFs+v69veouEm3rmtkgWYBOL5pT7lv5TWaEfEhcA0EDEBYC41iwjobL/fq2JC2ymptpv4kIAAA3HMRcAAAAAgoK4AAAAABAUxAUAAACAoCAuAAAAAAQFcQEAAAAgKIgLAAAAAEFBXAAAAAAICuICAAAAQFAQFwAAAACCgrgAAAAAEBTEBQAAAICgIC4AAAAABAVxAQAAACAoiAsAAAAAQUFcAAAAAAgK4gIAAABAUBAXAAAAAIKCuAAA1GvdurUyYsSdcsIJB8jhh+8qr776jITKDz98LVOnFgsAILolCAAgYiZN+l4++eRdmTKlSFq0aCl9++4iQ4deLe3adbBu9/l8smDB39Khw46SmJgowWCiwVw6dOi01fuNHj1Sfv/9Z/nPf24Sr9dr/QzB/P513XvvzTJkyFDp3z9XAADRi8kFAETI+PEfyB13XCOpqWly7bV3yIknDpGlS5fIk08+WHufzz77UC644CRZs2a1BMvQoafIm2++tM37zZo1XbKy8uXAA4+QQw45usEr/g39/gCA2MPkAgAi5MMP39SV9zy59db7a6877rhTpLy8TOygoqJCXC5eJgAADcfkAgAixOzy5PF4xO/3117ndDqlWbPm1sfnnnu8jBx5j/Xx4MFHWMc9VFVVSWVlpTz88F1y1VXnysCB+1j3M8dDmO8XYHazMvf/5595cv/9t8kxxwyQsWNfsK5bvnypTk3etz5+8cVRm/1c3377mXXb/Pl/1X780EN3WLeZ3aNeeOEJueiiU/XP3lduueVyWbFiuX wing keystrokes and delayed fetch calls—saves bandwidth and improves UX!</p>\n<h3>Pattern 4: Caching (Avoid Duplicate Requests)</h3>\n<pre><code class=\"language-javascript\">let cachedData = null;\n\nasync function getData() {\n  if (cachedData) {\n    console.log(&#39;Using cached data&#39;);\n    return cachedData;\n  }\n  \n  const response = await fetch(&#39;data.json&#39;);\n  cachedData = await response.json();\n  return cachedData;\n}\n</code></pre>\n<h3>Pattern 5: Parallel Requests</h3>\n<p>Fetch multiple resources at once:</p>\n<pre><code class=\"language-javascript\">async function loadAll() {\n  const [provinces, students, products] = await Promise.all([\n    fetch(&#39;provinces.json&#39;).then(r =&gt; r.json()),\n    fetch(&#39;students.json&#39;).then(r =&gt; r.json()),\n    fetch(&#39;products.json&#39;).then(r =&gt; r.json())\n  ]);\n  \n  console.log(&#39;All loaded!&#39;, {provinces, students, products});\n}\n</code></pre>\n<hr>\n<h3>🎯 Try it yourself — Search with Debounce</h3>\n<ul>\n<li>Open: <a href=\"assets/ajax-fetch/search-demo.html\"><code>assets/search-demo.html</code></a></li>\n<li>How: Double-click to open in your browser</li>\n</ul>\n<p>Tasks:</p>\n<ol>\n<li>Create a search input</li>\n<li>Debounce the input (500ms delay)</li>\n<li>Filter results from JSON data</li>\n<li>Display matching items</li>\n</ol>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/search-demo.html\"><code>search-demo.html</code></a></p>\n<hr>"},{"html":"<h2>Mini Project A — Philippine Weather Dashboard</h2>\n<p><strong>Goal:</strong> Fetch and display weather for major Philippine cities.</p>\n<p><strong>Features:</strong></p>\n<ul>\n<li>Current temperature, conditions, humidity</li>\n<li>Manila, Cebu, Davao tabs/buttons</li>\n<li>Loading spinner while fetching</li>\n<li>Error handling (use fallback mock data)</li>\n<li>Refresh button</li>\n</ul>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/weather.html\"><code>weather.html</code></a><br><strong>Mock Data:</strong> <a href=\"assets/ajax-fetch/weather-data.json\"><code>weather-data.json</code></a></p>\n<p><strong>Note:</strong> Uses OpenWeatherMap API (free tier). Can work offline with mock data if no internet.</p>\n<p><strong>Steps:</strong></p>\n<ol>\n<li>Get city buttons with <code>getElementById</code></li>\n<li>Listen for click, show loading state</li>\n<li>Fetch from API (or fallback to mock JSON)</li>\n<li>Parse response, display temp/conditions</li>\n<li>Handle errors gracefully</li>\n</ol>\n<hr>"},{"html":"<h2>Mini Project B — Barangay Directory</h2>\n<p><strong>Goal:</strong> Searchable directory of barangay officials.</p>\n<p><strong>Features:</strong></p>\n<ul>\n<li>List of officials (Name, Position, Contact)</li>\n<li>Search by name (with debounce)</li>\n<li>Filter by position (Captain, Kagawad, Secretary)</li>\n<li>Pagination (10 results per page)</li>\n</ul>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/directory.html\"><code>directory.html</code></a><br><strong>Data:</strong> <a href=\"assets/ajax-fetch/barangay-data.json\"><code>barangay-data.json</code></a></p>\n<p><strong>Key concepts:</strong> Fetch, filter arrays, pagination logic, debounced search</p>\n<hr>"},{"html":"<h2>Mini Project C — Simple Quiz App</h2>\n<p><strong>Goal:</strong> Multiple-choice quiz fetched from JSON.</p>\n<p><strong>Features:</strong></p>\n<ul>\n<li>Fetch questions from JSON file</li>\n<li>Display one question at a time</li>\n<li>Multiple choice buttons</li>\n<li>Show score at end</li>\n<li>Timer (bonus)</li>\n</ul>\n<p><strong>Download:</strong> <a href=\"assets/ajax-fetch/quiz.html\"><code>quiz.html</code></a><br><strong>Data:</strong> <a href=\"assets/ajax-fetch/questions.json\"><code>questions.json</code></a></p>\n<p><strong>Steps:</strong></p>\n<ol>\n<li>Fetch questions on page load</li>\n<li>Display first question</li>\n<li>Handle answer click</li>\n<li>Track score</li>\n<li>Show results screen</li>\n</ol>\n<hr>"},{"html":"<h2>Final Challenge — Data Dashboard</h2>\n<p>Students pick one theme and build a data dashboard with multiple fetch calls, aggregation, and visualization.</p>\n<p><strong>Downloads:</strong></p>\n<ul>\n<li><a href=\"assets/_shared/challenges/dashboard-starter.html\"><code>dashboard-starter.html</code></a> — Scaffold with TODOs</li>\n</ul>\n<h3>Theme 1: School Stats Dashboard</h3>\n<ul>\n<li>Fetch: students, grades, attendance</li>\n<li>Display: total enrollment, average grade, attendance rate</li>\n<li>Charts: simple CSS bar charts by grade level</li>\n<li>Filter: by section, by grade</li>\n</ul>\n<h3>Theme 2: Store Analytics</h3>\n<ul>\n<li>Fetch: products, sales</li>\n<li>Display: total revenue, top products, low stock alerts</li>\n<li>Charts: sales by category</li>\n<li>Search: products by name</li>\n</ul>\n<h3>Theme 3: Public Transport Tracker</h3>\n<ul>\n<li>Fetch: routes, schedules</li>\n<li>Display: route list, next departures</li>\n<li>Filter: by route number</li>\n<li>Search: by destination</li>\n</ul>\n<p><strong>Requirements:</strong></p>\n<ul>\n<li>At least 2 fetch calls</li>\n<li>Loading states for each</li>\n<li>Error handling</li>\n<li>Data aggregation (totals, averages)</li>\n<li>One visualization (chart/graph)</li>\n<li>Search or filter feature</li>\n</ul>\n<hr>"},{"html":"<h2>When to Use Fetch/AJAX (vs Other Approaches)</h2>\n<h3>✅ Use Fetch When:</h3>\n<p><strong>1. Loading Data Without Page Reload</strong></p>\n<pre><code class=\"language-javascript\">// Perfect: Update content dynamically\nasync function loadLatestNews() {\n    const news = await fetch(&#39;/api/news&#39;).then(r =&gt; r.json());\n    displayNews(news);  // Page stays, content updates!\n}\n</code></pre>\n<p><strong>Why:</strong> Better UX, faster, no page flicker</p>\n<p><strong>Philippine Example:</strong> Load latest announcements without refreshing entire barangay website</p>\n<p><strong>2. Submitting Forms Asynchronously</strong></p>\n<pre><code class=\"language-javascript\">// Send data without leaving page\nasync function submitClearance(formData) {\n    const response = await fetch(&#39;/api/clearance&#39;, {\n        method: &#39;POST&#39;,\n        headers: {&#39;Content-Type&#39;: &#39;application/json&#39;},\n        body: JSON.stringify(formData)\n    });\n    \n    if (response.ok) {\n        showSuccess(&#39;Application submitted!&#39;);\n    }\n}\n</code></pre>\n<p><strong>Why:</strong> User sees confirmation instantly, no page reload</p>\n<p><strong>3. Real-Time Data Updates</strong></p>\n<pre><code class=\"language-javascript\">// Poll for updates every 30 seconds\nsetInterval(async () =&gt; {\n    const prices = await fetch(&#39;/api/prices&#39;).then(r =&gt; r.json());\n    updatePriceDisplay(prices);\n}, 30000);\n</code></pre>\n<p><strong>Philippine Example:</strong> Sari-sari store price checker - updates prices from supplier API</p>\n<p><strong>4. Multiple Independent Data Sources</strong></p>\n<pre><code class=\"language-javascript\">// Load from different sources in parallel\nconst [students, grades, attendance] = await Promise.all([\n    fetch(&#39;/api/students&#39;).then(r =&gt; r.json()),\n    fetch(&#39;/api/grades&#39;).then(r =&gt; r.json()),\n    fetch(&#39;/api/attendance&#39;).then(r =&gt; r.json())\n]);\n</code></pre>\n<p><strong>Why:</strong> Faster than sequential requests</p>\n<hr>\n<h3>❌ Don&#39;t Use Fetch When:</h3>\n<p><strong>1. Initial Page Load (Use Server-Side Rendering)</strong></p>\n<pre><code class=\"language-html\">&lt;!-- ❌ BAD: Slow, SEO-unfriendly --&gt;\n&lt;script&gt;\n    fetch(&#39;/api/products&#39;).then(r =&gt; r.json())\n        .then(products =&gt; displayProducts(products));\n&lt;/script&gt;\n\n&lt;!-- ✅ BETTER: Server renders HTML directly --&gt;\n&lt;ul&gt;\n    &lt;li&gt;Product 1&lt;/li&gt;\n    &lt;li&gt;Product 2&lt;/li&gt;\n&lt;/ul&gt;\n</code></pre>\n<p><strong>Why:</strong> Faster first paint, better for SEO, works without JavaScript</p>\n<p><strong>2. Large File Downloads</strong></p>\n<pre><code class=\"language-javascript\">// ❌ BAD: Downloading 500 MB file with fetch\n// Loads entire file into memory, crashes browser on budget phones\n\n// ✅ BETTER: Direct &lt;a&gt; download link\n&lt;a href=&quot;/files/large-video.mp4&quot; download&gt;Download Video&lt;/a&gt;\n</code></pre>\n<p><strong>3. User Already Expects Full Page Reload</strong></p>\n<pre><code class=\"language-javascript\">// ❌ Overengineered: Using fetch for simple links\n&lt;a href=&quot;#&quot; onclick=&quot;fetchAndDisplay(&#39;/about&#39;)&quot;&gt;About&lt;/a&gt;\n\n// ✅ Simpler: Just use normal link\n&lt;a href=&quot;/about&quot;&gt;About&lt;/a&gt;\n</code></pre>\n<p><strong>When:</strong> Navigation between completely different pages</p>\n<p><strong>4. No Internet Connection Required</strong></p>\n<pre><code class=\"language-javascript\">// ❌ BAD: Fetching data that could be embedded\nfetch(&#39;cities.json&#39;).then(r =&gt; r.json());\n\n// ✅ BETTER: Include data directly in page\nconst cities = [&#39;Manila&#39;, &#39;Cebu&#39;, &#39;Davao&#39;, &#39;Quezon City&#39;];\n</code></pre>\n<p><strong>Philippine Context:</strong> Avoid fetch for static data - works during brownouts!</p>\n<hr>\n<h3>🤔 Fetch vs Alternatives: Decision Framework</h3>\n<table>\n<thead>\n<tr>\n<th>Scenario</th>\n<th>Use Fetch</th>\n<th>Use Regular Link/Form</th>\n<th>Use WebSocket</th>\n</tr>\n</thead>\n<tbody><tr>\n<td>Update part of page</td>\n<td>✅ Yes</td>\n<td>❌ Reloads whole page</td>\n<td>-</td>\n</tr>\n<tr>\n<td>Submit form with feedback</td>\n<td>✅ Yes</td>\n<td>❌ No instant feedback</td>\n<td>-</td>\n</tr>\n<tr>\n<td>Navigate to new page</td>\n<td>❌ No</td>\n<td>✅ Yes</td>\n<td>-</td>\n</tr>\n<tr>\n<td>Real-time chat</td>\n<td>❌ Too slow</td>\n<td>❌ No</td>\n<td>✅ Yes</td>\n</tr>\n<tr>\n<td>Polling every 5 seconds</td>\n<td>✅ Yes</td>\n<td>❌ No</td>\n<td>⚠️ WebSocket better</td>\n</tr>\n<tr>\n<td>One-time data load</td>\n<td>✅ Yes</td>\n<td>✅ Either works</td>\n<td>-</td>\n</tr>\n<tr>\n<td>Download large file</td>\n<td>❌ No</td>\n<td>✅ Yes</td>\n<td>-</td>\n</tr>\n<tr>\n<td>Offline-first app</td>\n<td>❌ Not alone</td>\n<td>-</td>\n<td>-</td>\n</tr>\n<tr>\n<td>SEO important</td>\n<td>❌ No (client-side)</td>\n<td>✅ Yes (server-side)</td>\n<td>-</td>\n</tr>\n</tbody></table>\n<hr>\n<h3>📱 Philippine Context Examples</h3>\n<p><strong>Barangay Clearance System:</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Use Fetch: Check application status without reload\nasync function checkStatus(referenceNumber) {\n    const status = await fetch(`/api/clearance/${referenceNumber}`)\n        .then(r =&gt; r.json());\n    \n    statusDisplay.textContent = status.message;\n    // User sees update without reloading form\n}\n\n// ❌ Don&#39;t Use Fetch: Initial form display\n// Server should render the form directly (faster, works without JS)\n</code></pre>\n<p><strong>Sari-Sari Store Inventory:</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Use Fetch: Update stock quantity\nasync function updateStock(productId, quantity) {\n    await fetch(`/api/products/${productId}`, {\n        method: &#39;PATCH&#39;,\n        body: JSON.stringify({quantity})\n    });\n    \n    // Update display immediately\n    stockDisplay.textContent = quantity;\n}\n\n// ✅ Use Fetch: Search products as user types\nsearchInput.addEventListener(&#39;input&#39;, debounce(async () =&gt; {\n    const results = await fetch(`/api/search?q=${searchInput.value}`)\n        .then(r =&gt; r.json());\n    displayResults(results);\n}, 300));\n</code></pre>\n<p><strong>Student Grade Portal:</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Use Fetch: Load grades for selected quarter\nasync function loadGrades(quarter) {\n    const grades = await fetch(`/api/grades?quarter=${quarter}`)\n        .then(r =&gt; r.json());\n    displayGrades(grades);\n    // No page reload, instant switch between quarters\n}\n\n// ❌ Don&#39;t Use Fetch: Download grade report PDF\n// Just use: &lt;a href=&quot;/reports/grades.pdf&quot; download&gt;Download&lt;/a&gt;\n</code></pre>\n<hr>\n<h3>💡 Quick Decision Guide</h3>\n<p><strong>Ask yourself:</strong></p>\n<ol>\n<li><p><strong>Does data change frequently?</strong></p>\n<ul>\n<li>Yes, real-time → Fetch + polling or WebSocket</li>\n<li>No, static → Embed in page (no fetch)</li>\n</ul>\n</li>\n<li><p><strong>Is it critical for first page load?</strong></p>\n<ul>\n<li>Yes → Server-side render (no fetch)</li>\n<li>No, can load later → Fetch</li>\n</ul>\n</li>\n<li><p><strong>Will it work offline?</strong></p>\n<ul>\n<li>Must work offline → Don&#39;t rely on fetch alone</li>\n<li>Online only → Fetch is fine</li>\n</ul>\n</li>\n<li><p><strong>Is the data large (&gt;1 MB)?</strong></p>\n<ul>\n<li>Yes → Direct download link, not fetch</li>\n<li>No → Fetch is fine</li>\n</ul>\n</li>\n<li><p><strong>Does user expect page to stay?</strong></p>\n<ul>\n<li>Yes (updating cart, checking status) → Fetch</li>\n<li>No (navigating to About page) → Regular link</li>\n</ul>\n</li>\n</ol>\n<hr>\n<h3>🎯 Philippine-Specific Considerations</h3>\n<p><strong>Slow Internet (3G/4G):</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Good: Show loading state immediately\nbutton.textContent = &#39;Loading...&#39;;\nconst data = await fetch(&#39;/api/data&#39;).then(r =&gt; r.json());\n\n// ✅ Good: Add timeout for slow connections\nconst controller = new AbortController();\nconst timeout = setTimeout(() =&gt; controller.abort(), 5000);\n\ntry {\n    const response = await fetch(&#39;/api/data&#39;, {\n        signal: controller.signal\n    });\n} catch (error) {\n    if (error.name === &#39;AbortError&#39;) {\n        showError(&#39;Connection too slow. Try again?&#39;);\n    }\n} finally {\n    clearTimeout(timeout);\n}\n</code></pre>\n<p><strong>Data Costs (₱1-5 per MB):</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Good: Cache responses to save data\nconst cache = {};\n\nasync function fetchWithCache(url) {\n    if (cache[url]) {\n        return cache[url];  // Free! No data cost\n    }\n    \n    const data = await fetch(url).then(r =&gt; r.json());\n    cache[url] = data;\n    return data;\n}\n\n// ❌ Bad: Fetching same data repeatedly\n// User pays ₱5 for each fetch!\n</code></pre>\n<p><strong>Brownouts (No Power/Internet):</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Good: Provide offline fallback\nasync function loadData() {\n    try {\n        const data = await fetch(&#39;/api/data&#39;).then(r =&gt; r.json());\n        localStorage.setItem(&#39;cachedData&#39;, JSON.stringify(data));\n        return data;\n    } catch (error) {\n        // Use cached data during brownout\n        const cached = localStorage.getItem(&#39;cachedData&#39;);\n        if (cached) {\n            showWarning(&#39;Using offline data&#39;);\n            return JSON.parse(cached);\n        }\n        throw error;\n    }\n}\n</code></pre>\n<p><strong>Budget Phones (Limited Memory):</strong></p>\n<pre><code class=\"language-javascript\">// ✅ Good: Load data in chunks\nasync function loadStudents(page = 1, perPage = 20) {\n    const data = await fetch(`/api/students?page=${page}&amp;limit=${perPage}`)\n        .then(r =&gt; r.json());\n    return data;\n}\n\n// ❌ Bad: Load 10,000 students at once\n// Crashes phone, uses all data allowance\n</code></pre>\n<hr>\n<h3>✅ Best Practices Summary</h3>\n<p><strong>DO:</strong></p>\n<ul>\n<li>Use fetch for dynamic content updates</li>\n<li>Show loading states (slow Philippine internet)</li>\n<li>Handle errors gracefully (spotty connections)</li>\n<li>Cache responses when possible (save data costs)</li>\n<li>Provide offline fallbacks (brownouts common)</li>\n<li>Use async/await for readable code</li>\n<li>Set reasonable timeouts (3-5 seconds)</li>\n</ul>\n<p><strong>DON&#39;T:</strong></p>\n<ul>\n<li>Fetch data that could be embedded in HTML</li>\n<li>Forget error handling (networks fail!)</li>\n<li>Fetch large files (use direct downloads)</li>\n<li>Rely solely on fetch for critical content (SEO, first paint)</li>\n<li>Fetch repeatedly without caching (wastes data)</li>\n<li>Forget about users without internet</li>\n</ul>\n<hr>\n<h3>📊 Data Cost Comparison</h3>\n<p><strong>Without Fetch (Server-Side Render):</strong></p>\n<pre><code>Barangay clearance form:\n- Initial page load: 100 KB = ₱10\n- Submit form: 5 KB = ₱0.50\n- View result: 100 KB = ₱10 (full page reload)\nTotal: 210 KB = ₱21 per submission\n</code></pre>\n<p><strong>With Fetch (Client-Side Updates):</strong></p>\n<pre><code>Barangay clearance form:\n- Initial page load: 100 KB = ₱10 (once)\n- Submit form: 5 KB = ₱0.50 (fetch)\n- View result: 2 KB = ₱0.20 (JSON only)\nTotal: 107 KB = ₱10.70 per submission\nSAVINGS: ₱10.30 per submission (49% less!)\n</code></pre>\n<p><strong>For 100 monthly users:</strong></p>\n<ul>\n<li>Without fetch: ₱2,100</li>\n<li>With fetch: ₱1,070</li>\n<li><strong>Total savings: ₱1,030/month!</strong></li>\n</ul>\n<hr>"},{"html":"<h2>Troubleshooting &amp; Tips</h2>\n<h3>CORS Errors</h3>\n<p><strong>Error:</strong> <code>CORS policy: No &#39;Access-Control-Allow-Origin&#39; header</code></p>\n<p><strong>What it means:</strong> Browsers block requests to other domains for security.</p>\n<p><strong>Solutions:</strong></p>\n<ul>\n<li>Use local JSON files (no CORS issue)</li>\n<li>Use APIs that allow CORS (like JSONPlaceholder)</li>\n<li>Run a local server (Live Server extension)</li>\n<li>For production: backend must send CORS headers</li>\n</ul>\n<h3>&quot;Promise Pending&quot; in Console</h3>\n<p><strong>Problem:</strong></p>\n<pre><code class=\"language-javascript\">const data = fetch(&#39;data.json&#39;);\nconsole.log(data); // Promise {&lt;pending&gt;}\n</code></pre>\n<p><strong>Solution:</strong> Use <code>await</code> or <code>.then()</code>:</p>\n<pre><code class=\"language-javascript\">const data = await fetch(&#39;data.json&#39;).then(r =&gt; r.json());\nconsole.log(data); // Actual data\n</code></pre>\n<h3>JSON Parse Errors</h3>\n<p><strong>Error:</strong> <code>Unexpected token &lt; in JSON at position 0</code></p>\n<p><strong>Cause:</strong> Response is HTML (404 page) instead of JSON.</p>\n<p><strong>Solution:</strong> Check response status and content type:</p>\n<pre><code class=\"language-javascript\">if (!response.ok) {\n  throw new Error(`HTTP ${response.status}`);\n}\nconst contentType = response.headers.get(&#39;content-type&#39;);\nif (!contentType || !contentType.includes(&#39;application/json&#39;)) {\n  throw new Error(&#39;Not JSON response&#39;);\n}\n</code></pre>\n<h3>Network Tab in DevTools</h3>\n<p>Press <code>F12</code> → <strong>Network</strong> tab → Refresh page</p>\n<p>You can see:</p>\n<ul>\n<li>All fetch requests</li>\n<li>Response status codes</li>\n<li>Response headers</li>\n<li>Response body (preview JSON)</li>\n<li>Request timing</li>\n</ul>\n<p>This is your best debugging tool!</p>\n<hr>"},{"html":"<h2>What&#39;s Next?</h2>\n<p>After mastering fetch and async/await, explore:</p>\n<ol>\n<li><strong>REST APIs</strong> — GET, POST, PUT, DELETE (CRUD operations)</li>\n<li><strong>Authentication</strong> — API keys, Bearer tokens, OAuth</li>\n<li><strong>WebSockets</strong> — Real-time data (chat, live scores)</li>\n<li><strong>GraphQL</strong> — Alternative to REST with flexible queries</li>\n<li><strong>Service Workers</strong> — Offline-first apps, caching strategies</li>\n<li><strong>Frameworks</strong> — React/Vue handle async state elegantly</li>\n</ol>\n<hr>"},{"html":"<h2>Summary — Key Takeaways</h2>\n<p>✅ <strong>Asynchronous</strong> = don&#39;t block, handle &quot;later&quot;<br>✅ <strong>Promises</strong> = pending → fulfilled/rejected<br>✅ <strong>Fetch</strong> = get data from files/APIs<br>✅ <strong>Async/await</strong> = cleaner than .then() chains<br>✅ <strong>JSON</strong> = text format for data exchange<br>✅ <strong>Error handling</strong> = always try/catch or .catch()<br>✅ <strong>Loading states</strong> = better user experience<br>✅ <strong>Real patterns</strong> = debounce, cache, parallel  </p>\n<p>You&#39;re now ready to build data-driven web apps! 🚀</p>"}]</script>
    <script>
(function() {
    'use strict';
    
    // Theme Toggle Functionality
    (function initTheme() {
        var themeToggle = document.getElementById('theme-toggle');
        var themeIcon = themeToggle.querySelector('.theme-icon');
        var themeText = themeToggle.querySelector('.theme-text');
        var root = document.documentElement;
        
        // Load saved theme or default to dark
        var savedTheme = localStorage.getItem('lecture-theme') || 'dark';
        setTheme(savedTheme);
        
        function setTheme(theme) {
            var hljsDarkSheet = document.getElementById('hljs-style-dark');
            var hljsLightSheet = document.getElementById('hljs-style-light');
            if (theme === 'light') {
                root.setAttribute('data-theme', 'light');
                themeIcon.textContent = '🌙';
                themeText.textContent = 'Dark';
                localStorage.setItem('lecture-theme', 'light');
                // Switch to light theme for code highlighting
                if (hljsDarkSheet && hljsDarkSheet.sheet) { hljsDarkSheet.sheet.disabled = true; }
            if (hljsLightSheet && hljsLightSheet.sheet) { hljsLightSheet.sheet.disabled = false; }
            } else {
                root.removeAttribute('data-theme');
                themeIcon.textContent = '☀️';
                themeText.textContent = 'Light';
                localStorage.setItem('lecture-theme', 'dark');
                // Switch to dark theme for code highlighting
                if (hljsDarkSheet && hljsDarkSheet.sheet) { hljsDarkSheet.sheet.disabled = false; }
            if (hljsLightSheet && hljsLightSheet.sheet) { hljsLightSheet.sheet.disabled = true; }
            }
        }
        
        themeToggle.addEventListener('click', function() {
            var currentTheme = root.getAttribute('data-theme');
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        });
    })();
    
    // Console logging helper
    function log(msg, level) {
        var prefix = '[Lecture Player] ';
        if (level === 'error') console.error(prefix + msg);
        else if (level === 'warn') console.warn(prefix + msg);
        else console.log(prefix + msg);
    }
    
    // State
    var slides = [];
    var currentSlide = 0;
    var isPlaying = false;
    var autoAdvance = true;
    var manualMode = false;
    var isPaused = false;
    var availableVoices = [];
    var selectedVoice = null;
    
    // DOM Elements
    var container = document.getElementById('slide-container');
    var startOverlay = document.getElementById('start-overlay');
    var startButton = document.getElementById('start-button');
    var statusMessage = document.getElementById('status-message');
    var voiceSelect = document.getElementById('voice-select');
    var rateInput = document.getElementById('rate');
    var pitchInput = document.getElementById('pitch');
    var rateValue = document.getElementById('rate-value');
    var pitchValue = document.getElementById('pitch-value');
    var navControls = document.getElementById('nav-controls');
    var progressIndicator = document.getElementById('progress-indicator');
    var prevButton = document.getElementById('prev-button');
    var nextButton = document.getElementById('next-button');
    var pauseButton = document.getElementById('pause-button');
    var spinner = document.querySelector('.spinner');
    var voiceControlsContainer = document.getElementById('voice-controls-container');
    var speedControl = document.getElementById('speed-control');
    var speedSlider = document.getElementById('speed-slider');
    var speedValue = document.getElementById('speed-value');
    
    // Update rate/pitch displays
    rateInput.addEventListener('input', function() {
        rateValue.textContent = parseFloat(rateInput.value).toFixed(2) + 'x';
    });
    pitchInput.addEventListener('input', function() {
        pitchValue.textContent = parseFloat(pitchInput.value).toFixed(1);
    });
    
    // Update speed display (nav controls)
    speedSlider.addEventListener('input', function() {
        speedValue.textContent = parseFloat(speedSlider.value).toFixed(2) + 'x';
    });
    
    // Setup mode selection
    function setupModeSelection() {
        var modeRadios = document.querySelectorAll('input[name="playback-mode"]');
        
        for (var i = 0; i < modeRadios.length; i++) {
            modeRadios[i].addEventListener('change', function(e) {
                manualMode = (e.target.value === 'manual');
                
                if (manualMode) {
                    // Hide voice controls
                    voiceControlsContainer.classList.add('hidden');
                    
                    // Update status and button
                    updateStatus('Manual mode selected - ready to start', 'success');
                    startButton.textContent = 'Start (Manual Navigation)';
                    startButton.disabled = false;
                    
                    // Hide spinner
                    spinner.style.display = 'none';
                    
                    log('Manual mode selected by user');
                } else {
                    // Show voice controls
                    voiceControlsContainer.classList.remove('hidden');
                    
                    // Check voice status
                    if (availableVoices.length > 0) {
                        updateStatus('Auto-play mode - ' + availableVoices.length + ' voices available', 'success');
                        startButton.textContent = 'Start Presentation';
                        startButton.disabled = false;
                        spinner.style.display = 'none';
                    } else {
                        updateStatus('Loading voices...', '');
                        startButton.textContent = 'Initializing...';
                        startButton.disabled = true;
                        spinner.style.display = 'block';
                        // Re-trigger voice loading
                        initializeVoiceLoading();
                    }
                    
                    log('Auto-play mode selected by user');
                }
            });
        }
    }
    
    // Load slides
    try {
        var slidesData = document.getElementById('slides-data');
        if (!slidesData) {
            throw new Error('Slides data not found');
        }
        slides = JSON.parse(slidesData.textContent || '[]');
        if (!slides || slides.length === 0) {
            throw new Error('No slides found');
        }
        log('Loaded ' + slides.length + ' slides');
    } catch (e) {
        log('Failed to load slides: ' + e.message, 'error');
        updateStatus('Failed to load presentation', 'error');
        startButton.textContent = 'Error: No Slides';
        return;
    }
    
    // Initialize Code Highlighting (Highlight.js)
    if (typeof hljs !== 'undefined') {
        hljs.highlightAll();
        log('Code highlighting initialized', 'success');
    } else {
        log('Highlight.js not loaded - code blocks will not be highlighted', 'warn');
    }
    
    // Initialize Mermaid Diagram Rendering with feature flag
    var mermaidEnabled = true; // Feature flag for safe rollout
    if (typeof mermaid !== 'undefined') {
        try {
            mermaid.initialize({
                startOnLoad: false,  // We'll trigger manually
                theme: 'default',
                securityLevel: 'loose',  // Allow more flexibility
                themeVariables: {
                    darkMode: true,
                    background: '#1a1a1a',
                    primaryColor: '#4CAF50',
                    primaryTextColor: '#fff',
                    primaryBorderColor: '#4CAF50',
                    lineColor: '#666',
                    secondaryColor: '#ff9900',
                    tertiaryColor: '#f0f0f0'
                }
            });
            log('Mermaid initialized successfully', 'success');
        } catch (error) {
            log('Mermaid initialization error: ' + error.message, 'error');
            mermaidEnabled = false; // Disable mermaid if init fails
        }
    } else {
        log('Mermaid.js not loaded - diagrams will show as code blocks', 'warn');
        mermaidEnabled = false;
    }
    
    // Update status message
    function updateStatus(msg, type) {
        statusMessage.textContent = msg;
        statusMessage.className = type || '';
    }
    
    // Split text into sentences
    function splitIntoSentences(text) {
        var sentences = [];
        var buffer = '';
        for (var i = 0; i < text.length; i++) {
            var ch = text[i];
            buffer += ch;
            if (ch === '.' || ch === '!' || ch === '?' || ch === '\n') {
                var trimmed = buffer.trim();
                if (trimmed) sentences.push(trimmed);
                buffer = '';
            }
        }
        var remaining = buffer.trim();
        if (remaining) sentences.push(remaining);
        return sentences.length > 0 ? sentences : [text];
    }
    
    // Select best voice
    function selectBestVoice(voices) {
        if (!voices || voices.length === 0) return null;
        
        // Try US English first
        for (var i = 0; i < voices.length; i++) {
            if (/en-us/i.test(voices[i].lang)) {
                log('Selected US English voice: ' + voices[i].name);
                return voices[i];
            }
        }
        
        // Try any English
        for (var j = 0; j < voices.length; j++) {
            if (/^en/i.test(voices[j].lang)) {
                log('Selected English voice: ' + voices[j].name);
                return voices[j];
            }
        }
        
        // Use first available
        log('Using first available voice: ' + voices[0].name);
        return voices[0];
    }
    
    // Populate voice select
    function populateVoices() {
        try {
            availableVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
            voiceSelect.innerHTML = '';
            
            if (!availableVoices || availableVoices.length === 0) {
                var opt = document.createElement('option');
                opt.textContent = 'System default voice';
                voiceSelect.appendChild(opt);
                log('No voices available, using system default', 'warn');
                return false;
            }
            
            // Populate dropdown
            for (var i = 0; i < availableVoices.length; i++) {
                var voice = availableVoices[i];
                var option = document.createElement('option');
                option.value = i;
                option.textContent = voice.name + ' (' + voice.lang + ')';
                voiceSelect.appendChild(option);
            }
            
            // Select best voice
            selectedVoice = selectBestVoice(availableVoices);
            if (selectedVoice) {
                for (var k = 0; k < availableVoices.length; k++) {
                    if (availableVoices[k] === selectedVoice) {
                        voiceSelect.selectedIndex = k;
                        break;
                    }
                }
            }
            
            log('Populated ' + availableVoices.length + ' voices');
            return true;
        } catch (e) {
            log('Error populating voices: ' + e.message, 'error');
            return false;
        }
    }
    
    // Wait for voices with timeout
    function waitForVoices(callback) {
        var startTime = Date.now();
        var maxWait = 3000; // 3 seconds
        
        function check() {
            var hasVoices = populateVoices();
            if (hasVoices) {
                log('Voices loaded successfully');
                callback(true);
                return;
            }
            
            if (Date.now() - startTime > maxWait) {
                log('Voice loading timeout, continuing with defaults', 'warn');
                callback(false);
                return;
            }
            
            setTimeout(check, 200);
        }
        
        check();
    }
    
    // Speak text with error handling
    function speakText(text, onComplete) {
        if (!text || !text.trim()) {
            log('Empty text, skipping speech');
            setTimeout(onComplete, 500);
            return;
        }
        
        if (!window.speechSynthesis) {
            log('Speech synthesis not available', 'warn');
            setTimeout(onComplete, 1000);
            return;
        }
        
        try {
            var sentences = splitIntoSentences(text);
            var index = 0;
            
            function speakNext() {
                if (index >= sentences.length) {
                    onComplete();
                    return;
                }
                
                var sentence = sentences[index++];
                if (!sentence.trim()) {
                    setTimeout(speakNext, 200);
                    return;
                }
                
                var utterance = new SpeechSynthesisUtterance(sentence);
                
                // Apply voice if available
                var voiceIndex = parseInt(voiceSelect.value, 10);
                if (!isNaN(voiceIndex) && availableVoices[voiceIndex]) {
                    utterance.voice = availableVoices[voiceIndex];
                } else if (selectedVoice) {
                    utterance.voice = selectedVoice;
                }
                
                // Use speed slider if available (nav controls), otherwise use rate from overlay
                utterance.rate = parseFloat(speedSlider ? speedSlider.value : (rateInput ? rateInput.value : 0.95));
                utterance.pitch = parseFloat(pitchInput.value) || 1.0;
                
                utterance.onend = function() {
                    setTimeout(speakNext, 220);
                };
                
                utterance.onerror = function(e) {
                    log('Speech error: ' + e.error, 'warn');
                    setTimeout(speakNext, 250);
                };
                
                window.speechSynthesis.speak(utterance);
            }
            
            speakNext();
        } catch (e) {
            log('Error in speakText: ' + e.message, 'error');
            setTimeout(onComplete, 500);
        }
    }
    
    // Display slide
    function displaySlide(index) {
        if (index < 0 || index >= slides.length) {
            log('Invalid slide index: ' + index, 'error');
            return;
        }
        
        currentSlide = index;
        var slide = slides[index];
        
        try {
            container.innerHTML = slide.html;
            progressIndicator.textContent = 'Slide ' + (index + 1) + ' of ' + slides.length;
            
            // Render mermaid diagrams in the current slide with graceful degradation
            if (mermaidEnabled && typeof mermaid !== 'undefined') {
                // Marked.js creates <pre><code class="language-mermaid"> for mermaid blocks
                // Look for both patterns to handle different markdown parsers
                var mermaidBlocks = container.querySelectorAll('pre.mermaid, div.mermaid, pre code.language-mermaid, div code.language-mermaid');
                if (mermaidBlocks.length > 0) {
                    mermaid.run({
                        nodes: mermaidBlocks
                    }).then(function() {
                        log('Mermaid diagrams rendered for slide ' + index, 'success');
                    }).catch(function(error) {
                        // Graceful degradation: Show error and keep code block
                        log('Mermaid render error: ' + error.message, 'error');
                        // Add error message above failed diagram
                        for (var i = 0; i < mermaidBlocks.length; i++) {
                            mermaidBlocks[i].insertAdjacentHTML('beforebegin',
                                '<div class="mermaid-error">⚠️ Diagram could not be rendered. Showing code instead.</div>');
                        }
                    });
                }
            }
            
            // Update navigation buttons
            prevButton.disabled = (index === 0);
            nextButton.disabled = (index === slides.length - 1);
            
            log('Displaying slide ' + (index + 1));
        } catch (e) {
            log('Error displaying slide: ' + e.message, 'error');
            container.innerHTML = '<h1>Error displaying slide</h1>';
        }
    }
    
    // Play slide with speech
    function playSlide(index) {
        if (index >= slides.length) {
            container.innerHTML = '<h1>End of Presentation</h1><p>Press Previous to review slides</p>';
            isPlaying = false;
            log('Presentation complete');
            return;
        }
        
        displaySlide(index);
        
        // In manual mode, just display slide and wait for user navigation
        if (manualMode) {
            log('Manual mode - waiting for user navigation (slide ' + (index + 1) + ')');
            return;
        }
        
        // Check if paused - wait for resume
        if (isPaused) {
            log('Paused - waiting for resume (slide ' + (index + 1) + ')');
            return;
        }
        
        // Extract text for speech (auto mode only)
        var tempDiv = document.createElement('div');
        tempDiv.innerHTML = slides[index].html;
        var text = tempDiv.textContent || tempDiv.innerText || '';
        
        if (autoAdvance) {
            speakText(text, function() {
                if (isPlaying && !isPaused) {
                    playSlide(index + 1);
                }
            });
        }
    }
    
    // Navigation handlers
    function nextSlide() {
        if (currentSlide < slides.length - 1) {
            if (!manualMode) {
                // In auto mode, disable auto-advance when manually overriding
                autoAdvance = false;
                window.speechSynthesis.cancel();
            }
            playSlide(currentSlide + 1);
        }
    }
    
    function prevSlide() {
        if (currentSlide > 0) {
            if (!manualMode) {
                // In auto mode, disable auto-advance when manually overriding
                autoAdvance = false;
                window.speechSynthesis.cancel();
            }
            playSlide(currentSlide - 1);
        }
    }
    
    // Adjust speed with keyboard shortcuts
    function adjustSpeed(delta) {
        if (manualMode) return; // No speed control in manual mode
        
        var currentSpeed = parseFloat(speedSlider.value);
        var newSpeed = Math.max(0.6, Math.min(1.3, currentSpeed + delta));
        
        speedSlider.value = newSpeed.toFixed(2);
        speedValue.textContent = newSpeed.toFixed(2) + 'x';
        
        log('Speed adjusted to ' + newSpeed.toFixed(2) + 'x');
        showSpeedToast(newSpeed);
    }
    
    // Show speed toast notification
    function showSpeedToast(speed) {
        var toast = document.getElementById('speed-toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'speed-toast';
            document.body.appendChild(toast);
        }
        
        toast.textContent = 'Speed: ' + speed.toFixed(2) + 'x';
        toast.style.opacity = '1';
        
        // Fade out after 800ms
        setTimeout(function() {
            toast.style.opacity = '0';
        }, 800);
    }
    
    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
        if (!isPlaying) return;
        
        // Don't handle shortcuts while typing in input fields
        var activeTag = document.activeElement.tagName;
        if (activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT') {
            return;
        }
        
        if (e.key === ' ') {
            e.preventDefault();
            if (manualMode) {
                // In manual mode, spacebar advances slide
                nextSlide();
            } else {
                // In auto mode, spacebar toggles pause/resume
                togglePause();
            }
        } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            nextSlide();
        } else if (e.key === 'ArrowLeft') {
            e.preventDefault();
            prevSlide();
        }
        // Speed shortcuts (only in auto mode)
        else if (!manualMode) {
            if (e.key === '.' || e.key === '>') {
                e.preventDefault();
                adjustSpeed(0.1);
            } else if (e.key === ',' || e.key === '<') {
                e.preventDefault();
                adjustSpeed(-0.1);
            }
        }
    });
    
    // Start presentation
    function startPresentation() {
        log('Starting presentation in ' + (manualMode ? 'manual' : 'auto') + ' mode');
        startOverlay.style.display = 'none';
        navControls.classList.add('visible');
        isPlaying = true;
        isPaused = false;
        
        if (!manualMode) {
            // Auto mode: enable auto-advance and try voice one more time
            autoAdvance = true;
            populateVoices();
            
            // Sync speed slider to start overlay value
            if (rateInput && speedSlider) {
                speedSlider.value = rateInput.value;
                speedValue.textContent = parseFloat(rateInput.value).toFixed(2) + 'x';
                log('Synced speed: ' + rateInput.value + 'x');
            }
            
            // Show pause button and speed control in auto mode
            pauseButton.classList.remove('hidden');
            speedControl.classList.remove('hidden');
        } else {
            // Manual mode: no auto-advance, no voice needed
            autoAdvance = false;
            // Hide pause button and speed control in manual mode
            pauseButton.classList.add('hidden');
            speedControl.classList.add('hidden');
        }
        
        playSlide(0);
    }
    
    // Toggle pause/resume
    function togglePause() {
        if (manualMode) return; // No pause in manual mode
        
        isPaused = !isPaused;
        
        if (isPaused) {
            // Paused state
            window.speechSynthesis.cancel();
            pauseButton.textContent = '▶ Resume';
            pauseButton.classList.add('paused');
            log('Presentation paused');
        } else {
            // Resumed state
            pauseButton.textContent = '⏸ Pause';
            pauseButton.classList.remove('paused');
            log('Presentation resumed');
            // Resume playing current slide
            if (autoAdvance && currentSlide < slides.length) {
                playSlide(currentSlide);
            }
        }
    }
    
    // Button handlers
    startButton.addEventListener('click', startPresentation);
    nextButton.addEventListener('click', nextSlide);
    prevButton.addEventListener('click', prevSlide);
    pauseButton.addEventListener('click', togglePause);
    
    // Voice loading wrapper
    function initializeVoiceLoading() {
        if (manualMode) {
            log('Manual mode - skipping voice initialization');
            return;
        }
        
        if (!window.speechSynthesis) {
            log('Speech synthesis not supported', 'error');
            updateStatus('Text-to-speech not supported in this browser', 'warning');
            startButton.disabled = false;
            startButton.textContent = 'Start (Manual Mode)';
            spinner.style.display = 'none';
            return;
        }
        
        // Setup voice change listener
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = populateVoices;
        }
        
        // Wait for voices
        waitForVoices(function(success) {
            if (manualMode) return; // User switched to manual while loading
            
            spinner.style.display = 'none';
            if (success) {
                updateStatus('Ready! ' + availableVoices.length + ' voices available', 'success');
                startButton.textContent = 'Start Presentation';
            } else {
                updateStatus('Continuing with system default voice', 'warning');
                startButton.textContent = 'Start Anyway';
            }
            startButton.disabled = false;
        });
    }
    
    // Initialize
    log('Initializing lecture player');
    setupModeSelection();
    updateStatus('Choose playback mode above', '');
    
    // Start voice loading for auto mode (default)
    initializeVoiceLoading();
    
    log('Initialization complete');
})();
    </script>
</body>
