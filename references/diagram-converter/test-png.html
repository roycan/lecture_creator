<!DOCTYPE html>
<html>
<head>
  <title>PNG Export Debug</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.4/dist/mermaid.min.js"></script>
</head>
<body>
  <div id="preview"></div>
  <button onclick="testPNG()">Test PNG Export</button>
  <script>
    mermaid.initialize({ startOnLoad: false, theme: 'default' });
    
    const code = `flowchart TD
    A[Start] --> B{Is it working?}
    B -->|Yes| C[Great!]
    B -->|No| D[Check console]`;
    
    async function testPNG() {
      try {
        // Render diagram
        const { svg } = await mermaid.render('test-diagram', code);
        document.getElementById('preview').innerHTML = svg;
        
        // Get SVG element
        const svgEl = document.querySelector('#preview svg');
        console.log('SVG Element:', svgEl);
        console.log('Has xmlns?', svgEl.hasAttribute('xmlns'));
        console.log('xmlns value:', svgEl.getAttribute('xmlns'));
        
        // Clone and add xmlns
        const svgClone = svgEl.cloneNode(true);
        if (!svgClone.hasAttribute('xmlns')) {
          svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        }
        
        const serializer = new XMLSerializer();
        const svgText = serializer.serializeToString(svgClone);
        console.log('SVG Text (first 500 chars):', svgText.substring(0, 500));
        
        // Test: Create blob and image
        const blob = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        
        img.onload = () => {
          console.log('Image loaded successfully!', img.width, img.height);
          
          // Create canvas
          const canvas = document.createElement('canvas');
          canvas.width = img.width * 2;
          canvas.height = img.height * 2;
          const ctx = canvas.getContext('2d');
          
          console.log('Canvas size:', canvas.width, canvas.height);
          
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          // Convert to PNG
          const pngUrl = canvas.toDataURL('image/png');
          console.log('PNG Data URL length:', pngUrl.length);
          
          // Download
          const a = document.createElement('a');
          a.href = pngUrl;
          a.download = 'test-diagram.png';
          a.click();
          
          URL.revokeObjectURL(url);
          console.log('PNG export completed!');
        };
        
        img.onerror = (e) => {
          console.error('Image failed to load!', e);
          URL.revokeObjectURL(url);
        };
        
        img.src = url;
        console.log('Image src set, waiting for load...');
        
      } catch (err) {
        console.error('Error:', err);
      }
    }
    
    // Auto-test on load
    setTimeout(testPNG, 1000);
  </script>
</body>
</html>
