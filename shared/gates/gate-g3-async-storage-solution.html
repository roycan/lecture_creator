<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gate G3 — Save-a-Quote (SOLUTION)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
  <section class="section">
    <div class="container" style="max-width: 640px;">
      <h1 class="title is-4">💬 Save-a-Quote</h1>
      <p class="subtitle is-6"><strong>GATE G3 · SOLUTION (teacher reference)</strong></p>

      <div class="buttons">
        <button id="fetch-btn" class="button is-primary">Fetch a Quote</button>
        <button id="save-btn" class="button is-info">Save Current</button>
      </div>

      <p class="is-size-7 has-text-grey">Current quote:</p>
      <div id="current" class="box"></div>

      <p class="is-size-7 has-text-grey mt-4">Saved quotes (must survive a reload):</p>
      <ul id="saved" class="content"></ul>
    </div>
  </section>

  <script>
    const STORAGE_KEY = 'g3_saved_quotes';
    let saved = [];
    let current = null;

    // TODO 1
    function renderSaved() {
      const ul = document.getElementById('saved');
      ul.innerHTML = '';
      for (const q of saved) {
        const li = document.createElement('li');
        li.textContent = `"${q.content}" — ${q.author}`;
        ul.appendChild(li);
      }
    }

    // TODO 2
    function loadSaved() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        saved = JSON.parse(raw);
      }
      renderSaved();
    }

    // TODO 3
    async function loadItem() {
      const res = await fetch('data.json');
      const data = await res.json();
      current = data[Math.floor(Math.random() * data.length)];
      document.getElementById('current').innerHTML =
        `<p class="title is-5">"${current.content}"</p>` +
        `<p class="subtitle is-6">— ${current.author}</p>`;
    }

    // TODO 4
    function saveCurrent() {
      if (!current) return;       // nothing to save yet
      saved.push(current);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      renderSaved();
    }

    // TODO 5
    document.getElementById('fetch-btn').addEventListener('click', loadItem);
    document.getElementById('save-btn').addEventListener('click', saveCurrent);
    loadSaved(); // show saved quotes as soon as the page loads
  </script>
</body>
</html>
